[build]
  # Vite output dir — what Netlify publishes
  publish = "dist"
  # Run the same build the local Mac runs
  command = "npm run build"

[build.environment]
  # Node 18 (LTS) — both Node 20 (npm 10) and Node 22 (npm 10) hit the
  # npm optional-deps bug that fails to install Rollup's native binary
  # @rollup/rollup-linux-x64-gnu, crashing vite build with
  # MODULE_NOT_FOUND.  Node 18 ships with npm 9 which doesn't have the
  # bug.  Vite 5 still supports Node 18.
  NODE_VERSION = "18"
