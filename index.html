        const plPlay  = musicBody.querySelector('#phone-music-pl-play');
        const plClear = musicBody.querySelector('#phone-music-pl-clear');
        if (plView)  addTap(plView, () => {
          musicView = (musicView === 'selected') ? 'main' : 'selected';
          renderMusic();
        });
        if (plPlay)  addTap(plPlay, () => {
          if (!visibleSelected.length) return;
          window.__music?.playPlaylist?.(visibleSelected);
        });
        if (plClear) addTap(plClear, () => {
          for (const t of visibleTracks) playlistRemove(t);
          renderMusic();
        });
      };
      // Defer every music re-render one frame.  renderMusic() rebuilds
      // musicBody via innerHTML, which would destroy whatever track / genre /
      // playlist button the player just tapped (or dragged) mid-touchend — on
      // iOS that strands the touch and kills game input after returning to
      // gameplay (same class as the Crush / Leaderboard bug).  Each handler's
      // audio action (playTrack / shuffleAll / playStation) runs synchronously
      // BEFORE this wrapper, so playback isn't delayed; only the DOM rebuild
      // waits for the gesture to finish.  Internal retry/loading calls also
      // route through here harmlessly.
      const renderMusic = () => requestAnimationFrame(_renderMusicNow);
      // Music-modal pause button — toggles audio.paused via the
      // bridge.  Visual state updates from the audio system every
      // render so it stays in sync if pause comes from somewhere else.
      const musicPauseBtn = document.getElementById('phone-music-pause');
      const applyMusicPauseBtn = () => {
        // Reflect the real MUSIC paused state (holds until unpaused), not
        // the game-pause volume duck.
        const paused = !!window.__music?.isMusicPaused?.();
        musicPauseBtn?.classList.toggle('paused', paused);
        if (musicPauseBtn) musicPauseBtn.textContent = paused ? '▶' : '⏸';
      };
      if (musicPauseBtn) {
        addTap(musicPauseBtn, () => {
          window.__music?.toggleMusicPaused?.();
          applyMusicPauseBtn();
        });
      }

      // Volume slider — drives audio.volume directly through __music.
      // Initialised once when the music modal first opens (when the
      // game-side audio is sure to exist).
      const volSlider = document.getElementById('phone-music-vol');
      const volPct    = document.getElementById('phone-music-vol-pct');
      const syncVolFromGame = () => {
        const v = window.__music?.getVolume?.() ?? 0.32;
        const pct = Math.round(v * 100);
        if (volSlider) volSlider.value = String(pct);
        if (volPct)    volPct.textContent = `${pct}%`;
      };
      const applyVolFromSlider = () => {
        const pct = parseInt(volSlider?.value ?? '32', 10) || 0;
        window.__music?.setVolume?.(pct / 100);
        if (volPct) volPct.textContent = `${pct}%`;
      };
      if (volSlider) {
        volSlider.addEventListener('input',  applyVolFromSlider, { passive: true });
        volSlider.addEventListener('change', applyVolFromSlider, { passive: true });
      }
      const bgRadioToggle = document.getElementById('phone-music-bg');
      const syncBgRadioFromGame = () => {
        if (bgRadioToggle) bgRadioToggle.checked = !!window.__music?.isBackgroundRadioEnabled?.();
      };
      if (bgRadioToggle) {
        bgRadioToggle.addEventListener('change', () => {
          window.__music?.setBackgroundRadioEnabled?.(bgRadioToggle.checked);
        }, { passive: true });
      }

      addTap(musicShuffle, () => {
        window.__music?.shuffleAll?.();
        renderMusic();
      });
      addTap(musicShuffleG, () => {
        if (musicGenreIdx != null) window.__music?.playStation?.(musicGenreIdx);
        renderMusic();
      });
      // Bottom button behavior — CLOSE on the genre grid (closes the
      // whole music app, returns to the iPhone menu); BACK on the
      // song-list view (returns to the genre grid).
      addTap(musicClose, () => {
        // SELECTED view → BACK to the genre grid.
        if (musicView === 'selected') {
          musicView = 'main';
          musicGenreIdx = null;
          renderMusic();
          return;
        }
        // SONG list view → BACK to the genre grid.
        if (musicGenreIdx != null) {
          musicGenreIdx = null;
          renderMusic();
          return;
        }
        // GENRE grid view → CLOSE the music app.
        musicModal.classList.remove('open');
        releaseWakeLock();
        markModalClosing();
      });
      // Corner ✕ — always fully closes the music app (matches every other menu).
      addTap(document.getElementById('phone-music-x'), () => {
        musicModal.classList.remove('open');
        releaseWakeLock();
        markModalClosing();
      });
      // Music app — short tap opens the modal; long-hold toggles mute
      // without opening anything.  Visual indicator added below.
      const musicHit = document.querySelector('.phone-hit[data-action="music"]');
      const applyMusicMutedIndicator = () => {
        const muted = !!window.__music?.isMuted?.();
        musicHit?.classList.toggle('muted', muted);
      };
      // Screen wake lock — prevents iOS from sleeping the screen
      // while the music modal is up.  When the screen sleeps, iOS
      // suspends the AudioContext and the track silently dies a few
      // seconds later (the "song crashes after ~30s" report).
      let _wakeLock = null;
      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            _wakeLock = await navigator.wakeLock.request('screen');
            _wakeLock.addEventListener?.('release', () => { _wakeLock = null; });
          }
        } catch (_) { /* unsupported / denied — silently fall through */ }
      };
      const releaseWakeLock = () => {
        try { _wakeLock?.release?.(); } catch (_) {}
        _wakeLock = null;
      };
      // Re-acquire the lock when the document becomes visible again
      // (iOS auto-releases on tab switch).
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && musicModal.classList.contains('open')) {
          requestWakeLock();
        }
      });
      // When the player rotates to landscape, fully close the music
      // modal — its state (wake lock, lingering pointer captures
      // from a half-finished long-press, etc.) can otherwise block
      // taps on the game canvas.  The song keeps playing; the modal
      // just hides cleanly instead of staying "open" but invisible.
      const closeMusicForGameplay = () => {
        if (!musicModal.classList.contains('open')) return;     // nothing to clean up
        musicModal.classList.remove('open');
        releaseWakeLock();
        // Reset any in-progress drag visuals on song rows so the
        // next portrait open starts clean.
        musicBody.querySelectorAll('.song.dragging').forEach(r => {
          r.classList.remove('dragging');
          r.style.transform = '';
          r.style.touchAction = '';
        });
        // Belt-and-suspenders for iOS: if a song row had pointer
        // capture during a scroll/tap near the bottom of the list,
        // dropping the class alone may leave the just-finished gesture
        // in a weird target state.  Rebuilding clears transient row
        // listeners/capture targets while preserving playlist state.
        musicBody.innerHTML = '';
      };
      const onMusicOrientationChange = () => {
        const attempt = () => {
          if (window.innerHeight > window.innerWidth) return;   // still portrait
          closeMusicForGameplay();
        };
        // iOS reports old dimensions for the first orientation event
        // surprisingly often, so try again after layout settles.
        requestAnimationFrame(attempt);
        setTimeout(attempt, 80);
        setTimeout(attempt, 250);
      };
      window.addEventListener('resize',            onMusicOrientationChange);
      window.addEventListener('orientationchange', onMusicOrientationChange);

      // Open the music modal to the genre grid. Named (hoisted) so the tutorial
      // can call it directly — the music button uses addLongTap (tap/hold), which
      // ignores a synthetic click, so dispatchEvent('click') never opened it.
      function openMusicModal() {
        musicGenreIdx = null;
        musicModal.classList.add('open');
        renderMusic();
        syncVolFromGame();
        syncBgRadioFromGame();
        applyMusicPauseBtn();
        requestWakeLock();
        // Build the AudioContext + node graph NOW (using the user
        // gesture that just opened the modal) so the first song tap
        // only has to wait on the MP3 download, not the synth setup.
        window.__music?.warmup?.();
      }
      addLongTap(musicHit, openMusicModal, () => {
        // long-hold → toggle mute
        window.__music?.toggleMute?.();
        applyMusicMutedIndicator();
      });

      // ── Achievements modal ───────────────────────────────────────────
      const achModal = document.getElementById('phone-achievements');
      const achList  = document.getElementById('phone-achievements-list');
      const achSub   = document.getElementById('phone-achievements-sub');
      const achClose = document.getElementById('phone-achievements-close');
      const TIER_COLORS = { bronze: '#CD7F32', silver: '#C0C0C0', gold: '#FFD700' };
      const renderAchievements = () => {
        const data = window.__achievements?.list?.() ?? null;
        if (!data) {
          achList.innerHTML = `<div style="color:#88A; text-align:center; padding:6vmin;">Achievements load after the first game starts.</div>`;
          achSub.textContent = '0 / 0 unlocked';
          return;
        }
        const total  = data.length;
        const earned = data.filter(a => a.tier).length;
        achSub.textContent = `${earned} / ${total} unlocked`;
        achList.innerHTML = data.map(a => {
          const tier = a.tier;
          const tierColor = tier ? TIER_COLORS[tier] : '#FFD700';
          const rowClass  = tier ? 'earned' : 'locked';
          const badge     = tier
            ? `<div class="badge" style="--tier-color:${tierColor}">${tier.toUpperCase()}</div>`
            : '';
          return `<div class="row ${rowClass}" style="--tier-color:${tierColor}">
            <div class="icon">${a.icon || '🏆'}</div>
            <div class="info">
              <div class="name">${a.label}</div>
              <div class="desc">${a.desc || ''}</div>
            </div>
            ${badge}
          </div>`;
        }).join('');
      };
      addTap(achClose, () => { achModal.classList.remove('open'); markModalClosing(); });
      addTap(document.querySelector('.phone-hit[data-action="trophy"]'), () => {
        window.__notif?.ack?.('trophy');
        renderAchievements();
        achModal.classList.add('open');
      });
      addTap(document.getElementById('phone-trophy'), () => {
        window.__notif?.ack?.('trophy');
        renderAchievements();
        achModal.classList.add('open');
      });

      // ── Generic app modal: Leaderboard / Stats / Settings / Help ──────
      const appModal = document.getElementById('phone-app');
      const appTitle = document.getElementById('phone-app-title');
      const appBody  = document.getElementById('phone-app-body');
      const qhit     = (a) => document.querySelector(`.phone-hit[data-action="${a}"]`);
      const openApp  = (title, html) => {
        appTitle.textContent = title;
        appBody.innerHTML = html;
        appModal.classList.remove('tut-mode');   // reset chrome; tutorial re-adds it
        appModal.classList.add('open');
      };
      addTap(document.getElementById('phone-app-close'), () => {
        appModal.classList.remove('open', 'tut-mode'); markModalClosing();
      });
      const fmtClock = (s) => (s == null) ? '—'
        : `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
      const fmtTime  = (s) => {
        s = Math.max(0, Math.round(s || 0));
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      };

      // ── Shared stat-row formatting helpers ────────────────────────────
      const sRow   = (k, v) => `<div class="pa-row"><span class="k">${k}</span><span class="v">${v}</span></div>`;
      const sSec   = (t) => `<div class="pa-section">${t}</div>`;
      const sMoney = (n) => '$' + Math.round(n || 0).toLocaleString();
      const sNum   = (n) => Math.round(n || 0).toLocaleString();
      const sCap   = (k) => String(k).replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const sEmpty = `<div class="pa-row"><span class="k pa-dim">— none yet —</span><span class="v"></span></div>`;
      const sMap   = (obj, fmt) => {
        const e = Object.entries(obj || {});
        return e.length ? e.map(([k, v]) => sRow(sCap(k), fmt(v))).join('') : sEmpty;
      };

      // Leaderboard — Personal Best + Your Runs + House Leaderboard (the three
      // player profiles on this device, ranked, with switchable metric tabs).
      addTap(qhit('leaderboard'), () => {
        const r    = window.__stats?.get?.()?.records ?? {};
        const runs = window.__stats?.runs?.() ?? [];
        const fmtRunDate = (ts) => { try { const d = new Date(ts); return (d.getMonth() + 1) + '/' + d.getDate(); } catch (_) { return ''; } };
        const yourRuns = runs.length
          ? runs.slice(0, 10).map((run, i) =>
              sRow(`#${i + 1}${run.completed ? ' 🏁' : ''}`,
                   `${sMoney(run.score)} · ${sNum(run.miles)} mi`
                   + (run.ts ? ` <span class="pa-dim">${fmtRunDate(run.ts)}</span>` : ''))).join('')
          : `<p class="pa-note">No runs recorded yet — finish a run (or wreck / get busted) and it'll rank here so you can compare.</p>`;

        // House board: one row per player profile, re-ranked by the active tab.
        const house = window.__stats?.house?.() ?? [];
        const METRICS = {
          score: { label: 'Score', has: p => p.bestScore > 0,            val: p => sMoney(p.bestScore),
                   sort: (a, b) => (b.bestScore || 0) - (a.bestScore || 0) },
          time:  { label: 'Time',  has: p => p.fastestCompletionSec > 0, val: p => fmtClock(p.fastestCompletionSec),
                   sort: (a, b) => (a.fastestCompletionSec || 0) - (b.fastestCompletionSec || 0) },
          miles: { label: 'Miles', has: p => p.mostMilesRun > 0,         val: p => sNum(p.mostMilesRun) + ' mi',
                   sort: (a, b) => (b.mostMilesRun || 0) - (a.mostMilesRun || 0) },
        };
        // Plates are user text going into innerHTML — escape them (the plate
        // sanitizer also blocks these chars, but server/world entries and old
        // saves aren't guaranteed to have passed through it).
        const escPlate = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const hRow = (rank, p, valStr, dim) => {
          const name = escPlate((p.plate && p.plate !== '—') ? p.plate : 'YOU');
          const tag  = (p.active && p.plate && p.plate !== '—') ? ' <span class="pa-dim">(you)</span>' : '';
          const rk   = rank ? `#${rank} ` : '';
          return `<div class="pa-row${p.active ? ' lb-me' : ''}">`
               + `<span class="k">${rk}${name}${tag}</span>`
               + `<span class="v${dim ? ' pa-dim' : ''}">${valStr}</span></div>`;
        };

        const renderLB = (metric) => {
          const m = METRICS[metric] || METRICS.score;
          const ranked   = house.filter(m.has).sort(m.sort);
          const unranked = house.filter(p => !m.has(p));
          const tabs = Object.keys(METRICS).map(k =>
            `<button class="lb-tab${k === metric ? ' on' : ''}" data-lbtab="${k}">${METRICS[k].label}</button>`).join('');
          const houseBody = (ranked.length || unranked.length)
            ? `<div class="lb-tabs">${tabs}</div>`
              + ranked.map((p, i) => hRow(i + 1, p, m.val(p), false)).join('')
              + unranked.map(p => hRow(0, p, '—', true)).join('')
            : `<p class="pa-note">No other drivers yet — create more players on the title screen and their best runs rank here.</p>`;
          openApp('LEADERBOARD',
            sSec('Personal Best') +
            sRow('🏁 Best Score',         sMoney(r.bestScore) + (runs.length ? ` <span class="pa-dim">#1 of ${runs.length}</span>` : '')) +
            sRow('⏱ Fastest Trip',        fmtClock(r.fastestCompletionSec)) +
            sRow('🛣 Most Miles (one run)', sNum(r.mostMilesRun) + ' mi') +
            sRow('✨ Longest No-Damage',    sNum(r.longestNoDamageStreakMiles) + ' mi') +
            sRow('⚡ Top Speed',           sNum(r.topSpeed) + ' mph') +
            sSec('Your Runs') +
            yourRuns +
            sSec('House Leaderboard') +
            houseBody +
            sSec('🌐 World') +
            `<div id="lb-world"><p class="pa-note">Loading world rankings…</p></div>`);
          // Re-bind the metric tabs (innerHTML rebuilds them every render).
          // Defer the re-render one frame so the tapped tab isn't destroyed
          // mid-touchend (iOS strands the touch → dead game input on resume).
          document.querySelectorAll('#phone-app-body [data-lbtab]').forEach(btn =>
            addTap(btn, () => { const k = btn.getAttribute('data-lbtab'); requestAnimationFrame(() => renderLB(k)); }));
          // World board — async fetch from the cloud (best-effort).  The active
          // metric tab mirrors the house board; fill #lb-world when it returns,
          // but only if that metric is STILL the active tab (the user may have
          // switched while the request was in flight).
          const myId = (window.__plate && window.__plate.playerId) ? window.__plate.playerId() : '';
          const wVal = (e) => metric === 'score' ? sMoney(e.score)
                            : metric === 'time'  ? fmtClock(e.timeSec)
                            : sNum(e.miles) + ' mi';
          const wRow = (e) => {
            const me = !!e.playerId && e.playerId === myId;
            const name = escPlate((e.plate && String(e.plate).trim()) ? e.plate : '—');
            return `<div class="pa-row${me ? ' lb-me' : ''}">`
                 + `<span class="k">#${e.rank} ${name}${me ? ' <span class="pa-dim">(you)</span>' : ''}</span>`
                 + `<span class="v">${wVal(e)}</span></div>`;
          };
          if (window.__leaderboard && window.__leaderboard.world) {
            window.__leaderboard.world(metric, 20).then((entries) => {
              const el = document.getElementById('lb-world');
              if (!el) return;
              const active = document.querySelector('#phone-app-body [data-lbtab].on');
              if (active && active.getAttribute('data-lbtab') !== metric) return;  // tab changed
              el.innerHTML = (entries && entries.length)
                ? entries.map(wRow).join('')
                : `<p class="pa-note">No world runs yet — finish a run to be the first! (Or you're offline.)</p>`;
            }).catch(() => {});
          }
        };
        renderLB('score');
      });

      // Stats — This Trip + Lifetime + Records + full breakdowns.
      addTap(qhit('stats'), () => {
        const s   = window.__stats?.get?.() ?? {};
        const L   = s.lifetime ?? {};
        const ses = window.__stats?.session?.() ?? {};
        const r   = s.records ?? {};
        const sp  = s.spent ?? {};
        openApp('STATS',
          sSec('This Trip') +
          sRow('Miles',               sNum(ses.miles) + ' mi') +
          sRow('Drive time',          fmtTime(ses.tripTimeSec)) +
          sRow('Earned',              sMoney(ses.earnedThisTrip)) +
          sRow('Spent',               sMoney(ses.spentThisTrip)) +
          sRow('NPC cars hit',        sNum(ses.npcHits)) +
          sRow('Damage taken',        sNum(ses.damageTaken)) +
          sRow('Consumables Collected', sNum(ses.vicesCollected)) +
          sRow('Weapons collected',   sNum(ses.weaponsCollected)) +
          sRow('Hitchhikers (good/bad)', `${sNum(ses.hitchhikersGood)} / ${sNum(ses.hitchhikersBad)}`) +
          sRow('Times robbed',        `${sNum(ses.robberies)} · ${sMoney(ses.robbedAmount)}`) +
          sRow('Top speed',           sNum(ses.topSpeed) + ' mph') +
          sRow('Pitstop time',        fmtTime(ses.pitstopSec)) +

          sSec('Lifetime') +
          sRow('Trips completed',     `${sNum(L.tripsCompleted)} / ${sNum(L.tripsStarted)}`) +
          sRow('Miles',               sNum(L.miles) + ' mi') +
          sRow('Drive time',          fmtTime(L.driveTimeSec)) +
          sRow('Total time in game',  fmtTime(s.totalGameplaySec)) +
          sRow('Total pitstop time',  fmtTime(s.totalPitstopSec)) +
          sRow('NPC cars hit',        sNum(L.npcHits)) +
          sRow('Wrecks',              sNum(L.wrecks)) +
          sRow('Damage taken',        sNum(L.damageTaken)) +
          sRow('Consumables Collected', sNum(L.vicesCollectedTotal)) +
          sRow('Weapons collected',   sNum(L.weaponsCollectedTotal)) +
          sRow('Total earned',        sMoney(L.earnedGross)) +
          sRow('Total spent',         sMoney(L.spentTotal)) +
          sRow('Hitchhikers (good/bad)', `${sNum(s.hitchhikers?.good)} / ${sNum(s.hitchhikers?.bad)}`) +
          sRow('Times robbed',        `${sNum(s.robberies?.count)} · ${sMoney(s.robberies?.amount)}`) +
          sRow('Speeding tickets',    `${sNum(s.police?.tickets)}`) +
          sRow('Fines paid',          sMoney(s.police?.finesPaid)) +
          sRow('Times busted (stops)',`${sNum(s.police?.busts)}`) +

          sSec('Records') +
          sRow('Best score',          sMoney(r.bestScore)) +
          sRow('Fastest trip',        fmtClock(r.fastestCompletionSec)) +
          sRow('Most miles (one run)', sNum(r.mostMilesRun) + ' mi') +
          sRow('Longest no-damage',   sNum(r.longestNoDamageStreakMiles) + ' mi') +
          sRow('Top speed',           sNum(r.topSpeed) + ' mph') +

          sSec('Earnings by source') +
          sMap(s.earned?.bySource, sMoney) +
          sRow('From score multiplier', sMoney(s.earned?.fromMultiplier)) +

          sSec('Spending') +
          sRow('Vices',       sMoney(sp.vicesTotal)) +
          sRow('Weapons',     sMoney(sp.weaponsTotal)) +
          sRow('Vehicles',    sMoney(sp.vehicles)) +
          sRow('Accessories', sMoney(sp.accessories)) +
          sRow('Services',    sMoney(sp.services)) +

          sSec('Consumables Collected (by type)') +
          sMap(s.vices?.collected, sNum) +

          sSec('Weapons collected (by type)') +
          sMap(s.weapons?.collected, sNum) +

          sSec('Per vehicle') +
          (Object.entries(s.perVehicle || {}).length
            ? Object.entries(s.perVehicle).map(([id, v]) =>
                sRow(sCap(id), `${sNum(v.miles)} mi · ${sNum(v.npcHits)} hits`)).join('')
            : sEmpty) +

          sSec('Rest stops') +
          (Object.entries(s.restStops || {}).length
            ? Object.entries(s.restStops).map(([id, v]) =>
                sRow(sCap(id), `${sNum(v.visits)}× · ${fmtTime(v.totalTimeSec)}`)).join('')
            : sEmpty));
      });

      // Settings — volume / mute / haptics.  Works from the start menu.
      addTap(qhit('settings'), () => {
        const g = window.__settings?.get?.() ?? { muted: false, volume: 0.32, haptics: true };
        const kmh   = (window.__settings?.getUnits?.() ?? 'mph') === 'kmh';
        const shkPct = Math.round((window.__settings?.getShake?.() ?? 1) * 100);
        const hudOn = window.__settings?.getHud?.() ?? true;
        // Escaped — plate is user text and this string goes into innerHTML.
        const curPlate = (window.__plate?.get?.() ?? '').trim()
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        // App-icon switch is iOS-only (uses native alternate icons).
        const isIOS     = window.Capacitor?.getPlatform?.() === 'ios';
        const altIconOn = ((localStorage.getItem('rtr_appIcon') ?? localStorage.getItem('dui_appIcon')) || '') === 'AltIcon';
        openApp('SETTINGS',
          sSec('Profile') +
          `<div class="pa-row"><span class="k">🪪 Driver plate</span><button id="set-plate" class="pa-toggle on">${curPlate ? curPlate : 'SET'}</button></div>` +
          `<p class="pa-note">Your public username on the leaderboard.</p>` +
          sSec('Audio') +
          `<div class="pa-row"><span class="k">🔊 Volume</span><input id="set-vol" type="range" min="0" max="100" value="${Math.round((g.volume || 0) * 100)}"></div>` +
          `<div class="pa-row"><span class="k">🔇 Mute sound</span><button id="set-mute" class="pa-toggle ${g.muted ? 'on' : ''}">${g.muted ? 'ON' : 'OFF'}</button></div>` +
          sSec('Gameplay') +
          `<div class="pa-row"><span class="k">📏 Units</span><button id="set-units" class="pa-toggle on">${kmh ? 'KM/H' : 'MPH'}</button></div>` +
          `<div class="pa-row"><span class="k">📳 Screen shake</span><input id="set-shake" type="range" min="0" max="100" value="${shkPct}"></div>` +
          `<div class="pa-row"><span class="k">🎮 Customize controls</span><button id="set-customize" class="pa-toggle on">EDIT</button></div>` +
          sSec('Accessibility') +
          `<div class="pa-row"><span class="k">📳 Haptics</span><button id="set-hap" class="pa-toggle ${g.haptics ? 'on' : ''}">${g.haptics ? 'ON' : 'OFF'}</button></div>` +
          (isIOS
            ? sSec('Appearance') +
              `<div class="pa-row"><span class="k">🎨 App icon</span><button id="set-icon" class="pa-toggle ${altIconOn ? 'on' : ''}">${altIconOn ? 'ALT' : 'DEFAULT'}</button></div>` +
              `<p class="pa-note">Switch your home-screen icon between the two app-icon designs.</p>`
            : '') +
          sSec('Data') +
          `<div class="pa-row"><span class="k">♻️ Reset player</span><button id="set-reset" class="pa-toggle" style="border-color:#FF4466;color:#FF7799;background:#2a1118;">RESET</button></div>` +
          `<p class="pa-note">Reset clears money, vehicles, vices &amp; checkpoints. Your lifetime stats, records and trophies are KEPT. Volume + mute apply instantly here on the start menu — no run needed.</p>`);
        const plateBtn = document.getElementById('set-plate');
        addTap(plateBtn, () => {
          // Edit the ACTIVE player's plate from Settings (not just first launch).
          window.showPlateModal?.({
            current: window.__plate?.get?.() ?? '',
            onDone: (name) => {
              const res = window.__plate?.set?.(name);
              if (res?.ok && plateBtn) plateBtn.textContent = res.plate;
            },
          });
        });
        const vol = document.getElementById('set-vol');
        vol?.addEventListener('input', () => window.__settings?.setVolume?.(vol.value / 100));
        const shk = document.getElementById('set-shake');
        shk?.addEventListener('input', () => window.__settings?.setShake?.(shk.value / 100));
        const mute = document.getElementById('set-mute');
        addTap(mute, () => {
          const on = !mute.classList.contains('on');
          window.__settings?.setMuted?.(on);
          mute.classList.toggle('on', on); mute.textContent = on ? 'ON' : 'OFF';
        });
        const hap = document.getElementById('set-hap');
        addTap(hap, () => {
          const on = !hap.classList.contains('on');
          window.__settings?.setHaptics?.(on);
          hap.classList.toggle('on', on); hap.textContent = on ? 'ON' : 'OFF';
        });
        const customize = document.getElementById('set-customize');
        addTap(customize, () => {
          // Arm the editor IMMEDIATELY so rotating to landscape enters it even
          // with the popup still up (no need to press OK).  The popup is just a
          // reminder to rotate; tapping Cancel un-arms it.  Desktop is already
          // landscape, so it opens right away with no popup.
          window.__customizeControls?.start?.();
          if (!window.__isDesktop) {
            showConfirm('📱 Rotate your phone to landscape to customize your controls — drag any item, then tap DONE.')
              .then(ok => { if (!ok) window.__customizeControls?.cancel?.(); });
          }
        });
        // App-icon switch (iOS native alternate icons).  Only present on iOS.
        const iconBtn = document.getElementById('set-icon');
        if (iconBtn) addTap(iconBtn, () => {
          const toAlt = iconBtn.textContent === 'DEFAULT';
          const name  = toAlt ? 'AltIcon' : '';   // '' = primary icon
          const plugin = window.Capacitor?.registerPlugin?.('AppIcon');
          if (!plugin?.setIcon) { showConfirm?.('Icon switching needs the latest app build.'); return; }
          plugin.setIcon({ name })
            .then(() => {
              localStorage.setItem('rtr_appIcon', name);
              iconBtn.classList.toggle('on', toAlt);
              iconBtn.textContent = toAlt ? 'ALT' : 'DEFAULT';
            })
            .catch((e) => showConfirm?.('Could not change icon: ' + (e?.message || e)));
        });
        const unitsBtn = document.getElementById('set-units');
        addTap(unitsBtn, () => {
          const toKmh = unitsBtn.textContent === 'MPH';
          window.__settings?.setUnits?.(toKmh ? 'kmh' : 'mph');
          unitsBtn.textContent = toKmh ? 'KM/H' : 'MPH';
        });
        const reset = document.getElementById('set-reset');
        addTap(reset, async () => {
          const ok = await showConfirm('Reset this player?  Their plate name, lifetime stats, records, trophies, money, vehicles and progress will all be ERASED.  Your other players are untouched.  This frees the plate so it can be renamed.');
          if (!ok) return;
          // Close this Settings modal first — resetProgress soft-restarts the
          // Game scene into a fresh title (no page reload), so the modal would
          // otherwise linger on top of it.
          appModal.classList.remove('open'); markModalClosing();
          window.__settings?.resetProgress?.();
        });
      });

      // Addiction Help — sincere, real resources + a donate link.  (DUI is
      // dark satire; this screen is played straight.)  Verify numbers/links
      // are current before shipping; US-based — add regional ones if localized.
      const ADDICTION_HTML = `
        <p class="pa-lead">Struggling with substance use, or worried about someone? Help is free, confidential, and available 24/7.</p>
        <div class="pa-row"><span class="k">SAMHSA National Helpline</span><a class="pa-link" href="tel:18006624357">1-800-662-4357</a></div>
        <div class="pa-row"><span class="k">Suicide &amp; Crisis Lifeline</span><a class="pa-link" href="tel:988">988</a></div>
        <div class="pa-row"><span class="k">Crisis Text Line</span><span class="v">Text HOME to 741741</span></div>
        <div class="pa-row"><span class="k">Find treatment</span><a class="pa-link" href="https://findtreatment.gov" target="_blank" rel="noopener">findtreatment.gov</a></div>
        <p class="pa-lead" style="margin-top:5vmin;">Support recovery &amp; safer roads:</p>
        <div class="pa-row"><span class="k">❤️ MADD</span><a class="pa-link" href="https://madd.org/donate" target="_blank" rel="noopener">madd.org</a></div>
        <div class="pa-row"><span class="k">❤️ SAMHSA</span><a class="pa-link" href="https://www.samhsa.gov" target="_blank" rel="noopener">samhsa.gov</a></div>
        <p class="pa-note">This game is fiction and dark comedy. Never drive impaired. Resources are US-based — confirm current details before relying on them.</p>`;
      addTap(qhit('addiction'), () => openApp('GET HELP', ADDICTION_HTML));

      // Contacts — a tappable contact LIST; pick a person to see their
      // info + action.  The Lawyer is a phone CALL (retainer); The Dealer
      // takes an order delivered to the next rest stop.
      addTap(qhit('messages'), () => {
        const backBtn = '<button id="msg-back" class="pa-toggle" style="margin-bottom:1.4vmin">‹ Contacts</button>';

        const renderList = () => {
          const st = window.__lawyer?.status?.() ?? { retained: false };
          const g  = window.__girl?.status?.() ?? { gone: false, responded: false, everTexted: false };
          const tx = window.__buddytexts?.threads?.() ?? {};
          const lastOf = (id) => {
            const t = tx[id];
            if (!t || !t.length) return 'No messages yet';
            const s = t[t.length - 1].text;
            return s.length > 36 ? s.slice(0, 35) + '…' : s;
          };
          const rows = [
            { id: 'girl',   name: '💕 The Crush',  sub: g.gone ? 'Found someone else 💔' : (g.everTexted ? (g.responded ? 'Replied 😘 — text them each town' : '… they\'re going quiet') : 'Invited you to the party!') },
            { id: 'lawyer', name: '⚖️ The Lawyer', sub: st.retained ? 'On retainer ✓' : 'Better Phone Saul' },
            { id: 'dealer', name: '🔌 The Plug',   sub: 'Delivers to the next rest stop' },
            { id: 'friend',  name: '🚨 The Friend',  sub: lastOf('friend') },
            { id: 'ex',      name: '🖤 The Ex',      sub: lastOf('ex') },
            { id: 'mom',     name: '👜 The Mom',     sub: lastOf('mom') },
            { id: 'boss',    name: '💼 The Boss',    sub: lastOf('boss') },
            { id: 'unknown', name: '❓ The Unknown', sub: lastOf('unknown') },
            { id: 'spam',    name: '🚫 The Spam',    sub: lastOf('spam') },
          ];
          openApp('CONTACTS',
            `<p class="pa-note">Tap a contact to view their info.</p>` +
            rows.map(c =>
              `<div class="pa-row contact-row" data-cid="${c.id}" style="cursor:pointer">
                 <span class="k">${c.name}${window.__notif?.unreadMsg?.(c.id) ? '<span class="msg-unread"></span>' : ''}<br><span class="pa-dim" style="font-size:0.82em">${c.sub}</span></span>
                 <span class="v">›</span>
               </div>`).join(''));
          appBody.querySelectorAll('.contact-row').forEach(row =>
            addTap(row, () => requestAnimationFrame(() => renderContact(row.dataset.cid))));
        };

        const renderLawyer = () => {
          const st = window.__lawyer?.status?.() ?? { retained: false, cash: 0, cost: 15000 };
          const afford = st.cash >= st.cost;
          const lawyerBtn = st.retained
            ? `<button class="pa-toggle on" disabled>✓ ON RETAINER</button>`
            : `<button id="msg-lawyer-call" class="pa-toggle ${afford ? 'on' : ''}">📞 CALL · $${st.cost.toLocaleString()}</button>`;
          openApp('CONTACTS',
            backBtn +
            sSec('⚖️ The Lawyer') +
            `<p class="pa-lead">"Better Phone Saul." Put me on retainer and I'll cut every future <b>BUSTED</b> fine in half — one-time fee, good for the rest of your life.</p>` +
            sRow('Status', st.retained ? '<span style="color:#44FF88;font-weight:800;">On retainer ✓</span>' : '<span class="pa-dim">Not retained</span>') +
            sRow('Your cash', '$' + st.cash.toLocaleString()) +
            `<div class="pa-row"><span class="k">Retainer</span>${lawyerBtn}</div>` +
            (st.retained
              ? '<p class="pa-note">Every busted fine is now halved. Drive however you like.</p>'
              : (afford ? '' : `<p class="pa-note">Need $${(st.cost - st.cash).toLocaleString()} more — earn it on the road, then call back.</p>`)));
          addTap(document.getElementById('msg-back'), () => requestAnimationFrame(renderList));
          if (!st.retained && afford) {
            const call = document.getElementById('msg-lawyer-call');
            if (call) addTap(call, () => { const r = window.__lawyer?.retain?.(); if (r?.ok) requestAnimationFrame(renderLawyer); });
          }
        };

        const renderDealer = () => {
          const cash = window.__lawyer?.status?.()?.cash ?? 0;
          const dl = window.__dealer?.status?.() ?? { cash, orders: [], vices: [] };
          const pending = dl.orders.length
            ? dl.orders.map(id => window.__dealer?.label?.(id) ?? id).join(', ')
            : '<span class="pa-dim">none</span>';
          const viceRows = dl.vices.length
            ? dl.vices.map(d =>
                `<div class="pa-row"><span class="k">${d.label}</span><button class="msg-order pa-toggle ${dl.cash >= d.price ? 'on' : ''}" data-vice="${d.id}" ${dl.cash < d.price ? 'disabled' : ''}>$${d.price.toLocaleString()}</button></div>`
              ).join('')
            : `<div class="pa-row"><span class="k pa-dim">No vices unlocked yet — pick some up on the road first.</span><span class="v"></span></div>`;
          openApp('CONTACTS',
            backBtn +
            sSec('🔌 The Plug') +
            `<p class="pa-lead">Call ahead and your order's waiting <b>FREE</b> at the next rest stop. You pay now — pickup or not.</p>` +
            sRow('Pending pickup', pending) +
            viceRows);
          addTap(document.getElementById('msg-back'), () => requestAnimationFrame(renderList));

        const renderGirl = () => {
          const g = window.__girl?.status?.() ?? { gone: false, responded: false, sent: 0, everTexted: false, canText: false, skipsLeft: 4, thread: [] };
          const cooling = g.everTexted && !g.responded && !g.gone;
          let statusLine, actionBtn, note;

            statusLine = '<span style="color:#FF6688;font-weight:800;">💔 Found someone else</span>';

          } else {
            statusLine = !g.everTexted ? '<span class="pa-dim">Hasn\'t heard back</span>'
                       : g.responded   ? '<span style="color:#FF88CC;font-weight:800;">Replied 😘</span>'
                       :                 '<span style="color:#FFC04D;font-weight:800;">… going quiet</span>';
            if (g.canText) {
              const label = !g.everTexted ? '💬 Text them back'
                          : cooling        ? '📱 Text them — win them back'
                          :                  '📱 Text them';
              actionBtn = `<button id="msg-girl-text" class="pa-toggle on">${label}</button>`;
            } else {
              actionBtn = `<button class="pa-toggle" disabled>✓ Texted this town — again next town</button>`;
            }
            note = `Text them once every town to keep them warm — it's free. Skip too many towns (${g.skipsLeft} left) and they'll find someone else. Reach the Pullman party still together for a bonus.`;
          }
          // Their incoming texts this run (annoyed → angry → silent "…" → gone,
          // plus a miss-you reply when you text 3 towns in a row).
          const thread = (g.thread ?? []);
          const convo = thread.length
            ? thread.map(m => `<div class="pa-row"><span class="k">${m.text}<br><span class="pa-dim" style="font-size:0.78em">${m.time ? m.time : `~mile ${m.mile}`}</span></span></div>`).join('')
            : '';
          openApp('CONTACTS',
            backBtn +
            sSec('💕 The Crush') +
            `<p class="pa-lead">"Heyyy 🥰 you still coming to the party in Pullman?? text me every town so I know you care 💕"</p>` +
            sRow('Status', statusLine) +
            sRow('Texts sent', g.sent) +
            `<div class="pa-row"><span class="k">Keep them warm</span>${actionBtn}</div>` +
            (convo ? `<div class="pa-section">Their texts</div>${convo}` : '') +
            `<p class="pa-note">${note}</p>`);
          addTap(document.getElementById('msg-back'), () => requestAnimationFrame(renderList));
          const txt = document.getElementById('msg-girl-text');
          // Defer the re-render one frame: renderGirl() replaces appBody via
          // innerHTML, which destroys THIS button mid-touchend — on iOS that
          // strands the touch and the game canvas stops receiving taps after
          // you rotate back to gameplay.  The save write (__girl.text) stays
          // synchronous; only the DOM swap waits for the gesture to finish.
          if (txt) addTap(txt, () => { const r = window.__girl?.text?.(); if (r?.ok) requestAnimationFrame(renderGirl); });
        };

        // Pure-flavor texters (The Ex / Mom / The Boss / The Unknown) — read
        // their per-run thread; no actions, just the conversation.
        const BUDDY_NAMES = { friend: '🚨 The Friend', ex: '🖤 The Ex', mom: '👜 The Mom', boss: '💼 The Boss', unknown: '❓ The Unknown', spam: '🚫 The Spam' };
        const renderBuddy = (cid) => {
          const tx   = window.__buddytexts?.threads?.() ?? {};
          const msgs = tx[cid] ?? [];
          const body = msgs.length
            ? msgs.map(m => {
                const sender = (cid === 'spam' && m.from) ? `<b>${m.from}:</b> ` : '';
                return `<div class="pa-row"><span class="k">${sender}${m.text}<br><span class="pa-dim" style="font-size:0.78em">${m.time ? m.time : `~mile ${m.mile}`}</span></span></div>`;
              }).join('')
            : `<div class="pa-row"><span class="k pa-dim">No messages yet — they'll text you on the road.</span></div>`;
          openApp('CONTACTS', backBtn + sSec(BUDDY_NAMES[cid] ?? cid) + body);
          addTap(document.getElementById('msg-back'), () => requestAnimationFrame(renderList));
        };

        const renderContact = (cid) => {
          window.__notif?.ackMsg?.(cid);   // reading the thread clears its unread dot
          if (cid === 'lawyer') renderLawyer();
          else if (cid === 'dealer') renderDealer();
          else if (cid === 'girl') renderGirl();
          else if (BUDDY_NAMES[cid]) renderBuddy(cid);
        };
        renderList();
      });

      // First-ever-play nudge: the Tutorial tile pulses until the player opens
      // it the first time, then never again (persisted in localStorage).
      const TUT_SEEN_KEY = 'rtr_tutorialSeen';
      const markTutorialSeen = () => {
        try { localStorage.setItem(TUT_SEEN_KEY, '1'); } catch (_) {}
        qhit('tutorial')?.classList.remove('tut-flash');
        window.__notif?.refresh?.();   // tutorial dot reads the same flag
      };
      const tutSeenAlready = () => {
        try { return !!(localStorage.getItem(TUT_SEEN_KEY) || localStorage.getItem('dui_tutorialSeen')); } catch (_) { return true; }
      };
      // First-open nudge: keep the Tutorial tile flashing until it's run once.
      if (!tutSeenAlready()) qhit('tutorial')?.classList.add('tut-flash');

      // ── Guided tutorial tour (owner 2026-07-17) — replaces the old slide
      // carousel. Tutorial is forced first; each listed button highlights, the
      // player taps it to open its REAL submenu with a quote box, taps the box
      // to advance, and so on through Music. Hold Skip (7s) to bail out. Only
      // forces on first-ever open while the phone menu is visible, so it can
      // never trap a player mid-drive.
      const TUT_TOUR = [
        { a: 'garage',      q: "Here you can buy upgrades for your ride — build your junk heap into a slammed sleeper… at least on the inside." },
        { a: 'maps',        q: "This is where you see the rest stops along your journey — or even teleport, once you unlock Custom mode." },
        { a: 'calendar',    q: "The calendar is where you'll find daily tasks and current missions. Complete them daily for big cash bonuses." },
        { a: 'trophy',      q: "To see all of your accomplishments and collections in the game, scope the Trophy section." },
        { a: 'stats',       q: "Check your miles driven, items collected, your fastest trip, and lots of other stats." },
        { a: 'messages',    q: "Maintain your relationships, for your own sake — you'd be surprised what you can gain from a good friendship." },
        { a: 'startover',   q: "Just like it sounds. Take a pause from your game by tilting the phone vertically — save at any point.", noSub: true },
        { a: 'leaderboard', q: "Compare your accomplishments with your friends or world leaders — but probably not Kim Jong Un." },
        { a: 'settings',    q: "There's a sleeper setting in here. You can actually customize your entire game layout by selecting Edit under the Gameplay section!" },
        { a: 'addiction',   q: "This game used to have a different… tone. That doesn't mean we should remove a good message, though." },
        { a: 'music',       q: "We'll start with music. Choosing your genre is choosing your path in life — each genre has its own vehicle and item art. Tap a genre's ☆ to lock it in.", pickGenre: true },
      ];

      const tutCap  = document.createElement('div'); tutCap.id = 'tut-capture';
      const tutBox  = document.createElement('div'); tutBox.id = 'tut-quote';
      tutBox.innerHTML = '<span class="tq-text"></span><span class="tq-next">next ❯</span>';
      const tutSkip = document.createElement('div'); tutSkip.id = 'tut-skip';
      tutSkip.innerHTML = 'HOLD TO SKIP<svg viewBox="0 0 100 40" preserveAspectRatio="none"><rect x="2" y="2" width="96" height="36" rx="6"></rect></svg>';
      document.body.appendChild(tutCap); document.body.appendChild(tutBox); document.body.appendChild(tutSkip);
      const tutRect = tutSkip.querySelector('rect');
      const SKIP_PERIM = 2 * (96 + 36);
      tutRect.style.strokeDasharray = SKIP_PERIM; tutRect.style.strokeDashoffset = SKIP_PERIM;

      let tutActive = false, tutIdx = -1, tutPhase = 'highlight';   // tutIdx -1 = Tutorial starter
      let tutAwaitGenre = false;   // Music step: waiting for the player to pick a genre
      let tutRotateWait = false;   // Final portrait step: locked until the player ROTATES to landscape
      const tutQhit = (a) => document.querySelector('.phone-hit[data-action="' + a + '"]');
      const tutClearFlash = () => document.querySelectorAll('.phone-hit.tut-flash').forEach(b => b.classList.remove('tut-flash'));
      const tutFlashOne = (a) => { tutClearFlash(); tutQhit(a)?.classList.add('tut-flash'); };
      const tutCloseModals = () => ['#phone-app', '#phone-map', '#phone-garage', '#phone-music', '#phone-achievements']
        .forEach(sel => { const m = document.querySelector(sel); if (m) m.classList.remove('open', 'tut-mode'); });

      function tutStart(fromForced) {
        if (tutActive) return;
        // NOTE: Skip is NOT shown yet — it only appears once the tour actually
        // begins (tutGotoHighlight), so the forced "tap Tutorial" prompt can't
        // be skipped before it's selected.
        tutActive = true; tutCap.classList.add('on');
        if (fromForced) { tutIdx = -1; tutPhase = 'highlight'; tutFlashOne('tutorial'); }
        else { tutGotoHighlight(0); }
      }
      // Clear the Music-step "waiting for a genre pick" state (pass-through
      // overlays + the tq-next hint) so later/earlier steps behave normally.
      const tutClearGenreWait = () => {
        tutAwaitGenre = false;
        tutCap.classList.remove('pass'); tutBox.classList.remove('pass');
        const n = tutBox.querySelector('.tq-next'); if (n) n.textContent = 'next ❯';
      };
      function tutGotoHighlight(i) {
        tutClearGenreWait();
        tutIdx = i; tutBox.classList.remove('show', 'tapped'); tutCloseModals();
        if (i >= TUT_TOUR.length) { tutFinish(); return; }
        tutSkip.classList.add('on');   // Skip is available once the tour is underway
        tutPhase = 'highlight'; tutFlashOne(TUT_TOUR[i].a);
      }
      function tutOpenSubmenu() {
        const step = TUT_TOUR[tutIdx]; tutPhase = 'submenu'; tutClearFlash();
        // Music step: the music button uses addLongTap (ignores synthetic
        // clicks), so open the genre grid directly. Everything else opens via a
        // dispatched click on its phone-hit button.
        if (step.pickGenre) {
          openMusicModal();
        } else if (!step.noSub) {
          const el = tutQhit(step.a); if (el) el.dispatchEvent(new Event('click'));
        }
        tutBox.querySelector('.tq-text').textContent = step.q;
        tutBox.classList.add('show');
        // Music step: the player must actually PICK a genre. Let taps fall
        // through to the real genre grid; only a genre selection advances.
        if (step.pickGenre) {
          tutAwaitGenre = true;
          tutCap.classList.add('pass'); tutBox.classList.add('pass');
          const n = tutBox.querySelector('.tq-next'); if (n) n.textContent = 'pick a genre ☆';
        }
      }
      function tutFinish() {
        tutClearGenreWait();
        tutActive = false; tutPhase = 'highlight'; tutClearFlash();
        tutBox.classList.remove('show', 'tapped'); tutCap.classList.remove('on'); tutSkip.classList.remove('on');
        tutCloseModals(); markTutorialSeen();
      }
      // Genre chosen during the Music step → the LAST portrait step: a locked
      // "Rotate Phone to Enter Game Play" prompt. Taps do nothing — the player
      // MUST rotate to landscape, which advances into the title-screen tutorial
      // (Stage 1, picked up by the Phaser side via the rtr_tutStage1 flag).
      function tutFinishGenre() {
        if (!tutActive || !tutAwaitGenre) return;
        tutClearGenreWait();
        tutCloseModals();
        tutBox.classList.remove('show', 'tapped');
        tutSkip.classList.remove('on');
        tutClearFlash();
        tutRotateWait = true;
        tutCap.classList.add('on');        // keep the menu locked — no tap advances
        markTutorialSeen();                // portrait tour complete
        try { localStorage.setItem('rtr_tutStage1', '1'); } catch (_) {}
        try {
          window.__rotatePrompt?.show?.({
            tutorial: true,
            onRotate: () => {
              tutRotateWait = false; tutActive = false;
              tutCap.classList.remove('on'); tutSkip.classList.remove('on');
              tutClearFlash();
              // Hand off to the Phaser title-screen tutorial once the rotation
              // settles and the title is interactive.
              setTimeout(() => { try { window.__titleTut?.start?.(); } catch (_) {} }, 450);
            },
          });
        } catch (_) {}
      }
      // Bridge for the music-menu genre star (index.html menu script).
      window.__tut = {
        active: () => tutActive,
        awaitingGenre: () => tutActive && tutAwaitGenre,
        genrePicked: () => { tutFinishGenre(); },
      };

      const tutPoint = (e) => (e.clientX != null) ? { x: e.clientX, y: e.clientY }
        : (e.changedTouches && e.changedTouches[0]) ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : null;
      const tutCapHit = (e) => {
        if (!tutActive) return;
        // Rotate-wait: menu is locked, taps do NOTHING — only rotating advances.
        if (tutRotateWait) { e.preventDefault(); e.stopPropagation(); return; }
        // Music step: don't advance on a stray tap — wait for a genre pick.
        if (tutAwaitGenre) return;
        e.preventDefault(); e.stopPropagation();
        // Submenu phase: a tap ANYWHERE on the screen advances to the next item.
        if (tutPhase === 'submenu') { tutGotoHighlight(tutIdx + 1); return; }
        const targetA = tutIdx < 0 ? 'tutorial' : TUT_TOUR[tutIdx].a;
        const el = tutQhit(targetA); if (!el) { tutGotoHighlight(tutIdx + 1); return; }
        const p = tutPoint(e), r = el.getBoundingClientRect();
        if (p && p.x >= r.left && p.x <= r.right && p.y >= r.top && p.y <= r.bottom) {
          if (tutIdx < 0) tutGotoHighlight(0);   // tapped Tutorial → start at Garage
          else tutOpenSubmenu();
        }
        // else: ignore — must tap the glowing button.
      };
      tutCap.addEventListener('pointerup', tutCapHit, { passive: false });
      tutCap.addEventListener('click', tutCapHit, { passive: false });

      const tutBoxTap = (e) => {
        if (!tutActive || tutAwaitGenre || tutPhase !== 'submenu' || tutBox.classList.contains('tapped')) return;
        e.preventDefault(); e.stopPropagation();
        tutBox.classList.add('tapped');
        setTimeout(() => tutGotoHighlight(tutIdx + 1), 130);
      };
      tutBox.addEventListener('pointerup', tutBoxTap, { passive: false });
      tutBox.addEventListener('click', tutBoxTap, { passive: false });

      // Skip — hold 7s; the border draws around the perimeter and resets on release.
      let skipRAF = null, skipStart = 0; const SKIP_MS = 3000;
      const skipTick = (now) => {
        const prog = Math.min(1, (now - skipStart) / SKIP_MS);
        tutRect.style.strokeDashoffset = SKIP_PERIM * (1 - prog);
        if (prog >= 1) { skipCancel(); tutFinish(); return; }
        skipRAF = requestAnimationFrame(skipTick);
      };
      function skipCancel() { if (skipRAF) cancelAnimationFrame(skipRAF); skipRAF = null; tutRect.style.strokeDashoffset = SKIP_PERIM; }
      tutSkip.addEventListener('pointerdown', (e) => { e.preventDefault(); if (skipRAF) return; skipStart = performance.now(); skipRAF = requestAnimationFrame(skipTick); }, { passive: false });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => tutSkip.addEventListener(ev, skipCancel));

      // Tutorial tile → run the tour (replaces the old carousel). Manual replay
      // jumps straight to the Garage highlight.
      addTap(qhit('tutorial'), () => tutStart(false));

      // Forced first-ever open: start the tour once the phone menu is visible.
      if (!tutSeenAlready()) {
        const menu = document.getElementById('phone-menu');
        let tries = 0;
        const tryForce = () => {
          if (tutActive || tutSeenAlready()) return;
          const vis = menu && getComputedStyle(menu).display !== 'none' && menu.getBoundingClientRect().width > 0;
          if (vis) tutStart(true);
          else if (++tries < 40) setTimeout(tryForce, 500);   // give up after ~20s (safety)
        };
        setTimeout(tryForce, 700);
      }

      // Calendar — Daily Challenge ("Run of the Day"). Read-only preview for
      // now; Play activates once the stage runner is wired (__daily.playable).
      addTap(qhit('calendar'), () => {
        window.__notif?.ack?.('calendar');
        const D = window.__daily;
        const today = D?.today?.() ?? null;
        const week  = D?.week?.()  ?? [];
        let html = sSec("Today's Run");
        if (today) {
          html += `<div class="pa-row"><span class="k" style="font-size:3.6vmin;font-weight:800;color:#FFD23D;">${today.name}</span></div>`;
          html += `<p class="pa-note" style="margin-top:0.5vmin;color:#CFE0F5;">${today.blurb}</p>`;
          html += sRow('Route', `${today.from} → ${today.to}`);
          html += sRow('First-try reward', '$5,000');
          if (D?.playable) {
            html += `<div style="text-align:center;margin-top:2.5vmin;"><button id="daily-play" style="font-family:inherit;font-weight:800;font-size:3.4vmin;color:#08110b;background:#39FF8A;border:none;border-radius:1.6vmin;padding:1.8vmin 6vmin;cursor:pointer;">▶ PLAY</button></div>`;
          } else {
            html += `<p class="pa-note" style="text-align:center;margin-top:2.5vmin;color:#7FA8D8;border:1px dashed #33506f;border-radius:1.5vmin;padding:2vmin;">▶ Play unlocks in the next update — runner wiring in progress.</p>`;
          }
        } else {
          html += `<p class="pa-note" style="text-align:center;margin-top:3vmin;">No run today — dailies are Mon–Fri. Check back Monday.</p>`;
        }
        const done = week.filter(w => w.done).length;
        html += sSec(`This Week — ${done}/5 · all 5 = +$5,000`);
        week.forEach(w => {
          html += sRow(`${w.dow}  ${w.name ?? '—'}`, w.done ? `✓ $${(w.payout || 0).toLocaleString()}` : '—');
        });
        html += sSec('How it works');
        html += '<p class="pa-note">Short 2–5 stop runs, each with one goal. Unlimited tries — but the payout drops $1,000 every attempt ($5,000 → $0 by try 6, and it still counts as done). Clear all five weekday runs for a +$5,000 bonus.</p>';
        // DEV: launch ANY challenge regardless of the weekday. Remove before
        // release alongside __daily.all() in main.js.
        const allRuns = D?.all?.() ?? [];
        if (allRuns.length) {
          html += sSec('▶ Test any run (dev)');
          allRuns.forEach(c => {
            html += `<div class="pa-row"><span class="k">${c.name}</span><span class="v"><button class="daily-test" data-id="${c.id}" style="font-family:inherit;font-weight:700;font-size:2.6vmin;color:#08110b;background:#39A8FF;border:none;border-radius:1vmin;padding:0.7vmin 2.6vmin;cursor:pointer;">PLAY</button></span></div>`;
          });
        }
        openApp('CALENDAR', html);
        if (today && D?.playable) {
          const pb = appBody.querySelector('#daily-play');
          if (pb) addTap(pb, () => { appModal.classList.remove('open'); D.start(today.id); });
        }
        appBody.querySelectorAll('.daily-test').forEach(b => addTap(b, () => {
          appModal.classList.remove('open'); D.start(b.getAttribute('data-id'));
        }));
      });

      // ── Boot — pull initial state from the Phaser game once it wires
      //    up the globals.  Retry every 100 ms until __phoneLock exists. -
      const bootTimer = setInterval(() => {
        if (window.__phoneLock) {
          applyLock();
          applySteering();
          if (window.__handedness) applyHand();
          if (window.__music) applyMusicMutedIndicator();
          clearInterval(bootTimer);
        }
      }, 100);
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
