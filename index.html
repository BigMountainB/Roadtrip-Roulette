  <script>
    (function () {
      const modal = document.getElementById('plate-modal');
      const input = document.getElementById('plate-input');
      const done  = document.getElementById('plate-done');
      const cancel = document.getElementById('plate-cancel');
      const errEl = document.getElementById('plate-err');
      if (!modal || !input || !done) return;
      let pendingDone = null;
      // Mirrors main.js _sanitizePlate: any printable ASCII except HTML-context
      // hazards (< > & " ' ` \) — keep the two in sync.
      const sanitize = (v) => String(v || '').toUpperCase()
        .replace(/[^\x20-\x7E]/g, '').replace(/[<>&"'`\\]/g, '').slice(0, 8);
      const showErr = (m) => { if (errEl) errEl.textContent = m || ''; };
      const close = () => { modal.classList.remove('open'); pendingDone = null; showErr(''); };
      input.addEventListener('input', () => { input.value = sanitize(input.value); showErr(''); });
      let submitting = false;
      const submit = async () => {
        if (submitting) return;
        // Local rules first (length / reserved / blocklist), shared with the
        // slot-picker so they can't drift apart.
        const local = (window.__plate && window.__plate.validate)
          ? window.__plate.validate(input.value)
          : (sanitize(input.value).trim() ? { ok: true, plate: sanitize(input.value).trim() } : { ok: false, reason: 'Enter a name.' });
        if (!local.ok) { showErr(local.reason || 'Invalid name.'); input.focus(); return; }
        // Server uniqueness (best-effort): blocks on a TAKEN name, allows it
        // when the server is unreachable (offline / pre-deploy).
        let res = local;
        if (window.__plate && window.__plate.claim) {
          submitting = true;
          showErr('Checking…'); errEl && (errEl.style.color = '#88CCFF');
          try { res = await window.__plate.claim(input.value); }
          catch (_) { res = local; }
          submitting = false;
          errEl && (errEl.style.color = '');
          if (!res.ok) { showErr(res.reason || 'That name is taken.'); input.focus(); return; }
        }
        const name = res.plate;
        const cb = pendingDone;
        pendingDone = null;
        modal.classList.remove('open');
        showErr('');
        if (cb) cb(name);
        else if (window.__plate && window.__plate.set) window.__plate.set(name);
      };
      done.addEventListener('click', submit);
      if (cancel) cancel.addEventListener('click', close);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter')  { e.preventDefault(); submit(); }
        if (e.key === 'Escape') { e.preventDefault(); close(); }
      });
      // Tapping the dark backdrop (outside the plate box) cancels.
      modal.addEventListener('pointerdown', (e) => { if (e.target === modal) close(); });
      // showPlateModal(opts?) — opts.current pre-fills the box; opts.onDone(name)
      // receives the chosen plate (the title-screen slot picker uses this so the
      // name lands in the right player slot).  No opts → sets the active plate.
      window.showPlateModal = (opts) => {
        opts = opts || {};
        pendingDone = (typeof opts.onDone === 'function') ? opts.onDone : null;
        const cur = (opts.current != null) ? opts.current
                  : ((window.__plate && window.__plate.get) ? window.__plate.get() : '');
        input.value = sanitize(cur || '');
        showErr('');
        modal.classList.add('open');
        setTimeout(() => { try { input.focus(); } catch (_) {} }, 60);
      };
    })();
  </script>

  <script>
    (function () {
      // Append ?debug (or ?debug=1) to the URL to flash all hit zones —
      // useful for verifying icon alignment without iOS dev tools.
      if (/[?&]debug(=|&|$)/.test(location.search)) {
        document.body.classList.add('debug');
      }

      // ── Calibration mode ─────────────────────────────────────────────
      // Append ?calibrate to the URL.  Tap any spot on the menu and a
      // floating chip prints the PNG-pixel coordinate of that point.
      // Use it to map each icon's actual location in the artwork; send
      // me the four coords (top-left + size) per icon and I plug them
      // straight into data-px.  No dev tools needed.
      if (/[?&]calibrate(=|&|$)/.test(location.search)) {
        document.body.classList.add('debug');
        const chip = document.createElement('div');
        chip.style.cssText = 'position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(0,0,0,0.85);color:#FFEE00;font:14px/1 monospace;padding:6px 10px;border-radius:6px;pointer-events:none;';
        chip.textContent = 'CALIBRATE: tap any icon';
        document.body.appendChild(chip);
        document.addEventListener('pointerdown', (e) => {
          // Uses the SAME auto-scale transform as the live hit zones
          // (coverState from recomputeCover) so calibration stays accurate.
          if (!coverState) return;
          const menu = document.getElementById('phone-menu');
          const rect = menu.getBoundingClientRect();
          const pngX = Math.round((e.clientX - rect.left - coverState.offX) / coverState.scale);
          const pngY = Math.round((e.clientY - rect.top  - coverState.offY) / coverState.scale);
          chip.textContent = `PNG: ${pngX}, ${pngY}`;
        }, { capture: true });
      }

      // ── Hit-zone auto-positioning ────────────────────────────────────
      // Hit zones are declared with data-px="x y w h" in PNG pixel
      // coordinates.  We compute the image's width-fit scale
      // and offset against the live viewport, then translate every
      // zone to viewport-pixel position so alignment tracks the
      // artwork on every device (no per-aspect % retuning).
      const bgImg = document.querySelector('#phone-menu img.bg');
      let coverState = null;
      const recomputeCover = () => {
        if (!bgImg.naturalWidth || !bgImg.naturalHeight) return null;
        const imgW = bgImg.naturalWidth, imgH = bgImg.naturalHeight;
        const menu = document.getElementById('phone-menu');
        // Measure the CONTAINER (fixed inset:0 = the full glass).  Do NOT use
        // visualViewport here: iOS excludes the strip reserved for Safari's
        // minimized bottom bar from vv.height even though the fixed container
        // (and the visible page) extend under it — centering on vv.height
        // shoved the art up and left a black band at the bottom (2026-07-13).
        // Fit + center within the VISIBLE viewport (visualViewport = glass
        // minus Safari's bottom bar).  In portrait Safari NEVER fully cedes
        // its nav-bar strip to a non-scrolling page (landscape auto-hides it,
        // which is why gameplay gets the whole screen) — centering into that
        // strip just gets the art's bottom clipped behind the bar.  The lvh
        // container stays black underneath so the whole glass reads seamless.
        // Home-Screen (standalone) apps: iOS under-reports visualViewport AND
        // innerHeight by ~62px (diagnosed on-device 2026-07-14: vv 402x812 vs
        // a real 402x874 glass, no browser chrome anywhere) — the 100lvh
        // container is the only honest height there.  In a Safari tab the
        // shorter visualViewport is REAL (the nav bar overlays the page), so
        // keep using it in that case.
        const vw = menu.clientWidth;
        const vh = navigator.standalone
          ? menu.clientHeight
          : Math.round(window.visualViewport?.height ?? menu.clientHeight);
        if (!vw || !vh) return null;
        // AUTO-SCALE (2026-07-13): every 853×1844 menu skin carries a baked-in
        // near-black dead border around the visible phone artwork — measured
        // identical on all 9 skins: L36 R35 T100 B37 px.  Contain-fitting the
        // FULL file kept that dead border inside the 15px margin, so the
        // visible art sat 30-75px from the screen edge on iPhone.  Fit the
        // VISIBLE content box to the 15px margin instead, centered; the dead
        // border overflows into the black letterbox where it's invisible.
        // coverState stays the full-image transform, so all data-px math is
        // untouched.
        const EDGE = 15;
        // VISIBLE content box (luminance-measured, identical on all skins):
        // bright art spans rows 106–1711 / cols 41–813 of the 853×1844 file.
        // The earlier {t:100,b:37} box included ~95px of essentially-black
        // filler BELOW the rotate strip (opaque but invisible on screen),
        // which pushed the visible art up — the "not centered vertically" bug.
        const INS = { l: 41, r: 853 - 813, t: 106, b: 1844 - 1712 };
        const cw = imgW - INS.l - INS.r, ch = imgH - INS.t - INS.b;
        const scale = Math.min((vw - EDGE * 2) / cw, (vh - EDGE * 2) / ch);
        const offX = (vw - cw * scale) / 2 - INS.l * scale;
        // CENTERED (final, owner-approved via the 2026-07-15 green-box
        // screenshot).  NOTE the black strip at the very bottom of the glass
        // in standalone mode is iOS'S OWN — the OS does not composite the
        // bottom ~62px of Home-Screen web apps (bottom-flush proved it: art
        // pushed there gets masked, not shown).  Centering parks the
        // letterbox slack under that mask, which is the best any layout can
        // do; the strip itself is not removable by the page.
        const offY = (vh - ch * scale) / 2 - INS.t * scale;
        coverState = { scale, offX, offY };
        // Size/position the art itself with the SAME transform the hit zones
        // use, so buttons stay glued to the artwork at any scale.
        bgImg.style.left   = offX + 'px';
        bgImg.style.top    = offY + 'px';
        bgImg.style.width  = (imgW * scale) + 'px';
        bgImg.style.height = (imgH * scale) + 'px';
        return coverState;
      };
      const placePngBox = (el, pngStr) => {
        if (!coverState || !pngStr) return;
        const [px, py, pw, ph] = pngStr.split(/\s+/).map(Number);
        el.style.left   = (coverState.offX + px * coverState.scale) + 'px';
        el.style.top    = (coverState.offY + py * coverState.scale) + 'px';
        el.style.width  = (pw * coverState.scale) + 'px';
        el.style.height = (ph * coverState.scale) + 'px';
      };
      const layoutHitZones = () => {
        if (!recomputeCover()) return;
        // Position every element with data-px — hit zones + trophy +
        // lock + anything else we tag later.
        document.querySelectorAll('[data-px]').forEach(btn => placePngBox(btn, btn.dataset.px));
        // Re-position the selection ring (its source is whichever
        // steering button is currently .selected).
        positionSelectionRing();
        // Re-glue the notification dots to their tiles' top-right corners
        // and re-evaluate which apps have something new (menu show fires
        // a resize → this runs on every open).
        positionNotifDots();
        refreshNotifDots();
      };
      // Move the steering ring onto the active steering button's
      // ring-rect, or hide it if nothing is selected.  Pulled out
      // so layout + applySteering can both call it.
      const positionSelectionRing = () => {
        const ring = document.getElementById('phone-selection-ring');
        if (!ring) return;
        const active = document.querySelector('.phone-hit.selected[data-ring-px]');
        if (!active) { ring.style.display = 'none'; return; }
        placePngBox(ring, active.dataset.ringPx);
        ring.style.display = 'block';
      };

      // ── Notification dots ─────────────────────────────────────────────
      // A small red badge on a tile's top-right corner when that app has
      // something NEW.  Per-app "mark vs ack" timestamps persist in
      // localStorage (rtr.notif.v1); the game bumps marks at event sites
      // (trophy earned, rest stop reached, text arrived, daily finished)
      // via window.__notif, and the tile's open handler acks them.
      // Messages tracks per-thread marks — the dot clears only when the
      // NEW thread is actually opened, not merely the Contacts list.
      const NOTIF_KEY  = 'rtr.notif.v1';
      const NOTIF_APPS = ['tutorial', 'garage', 'maps', 'calendar', 'trophy', 'messages'];
      const notifLoad = () => {
        let st = null;
        try { st = JSON.parse(localStorage.getItem(NOTIF_KEY)); } catch (_) {}
        if (!st || typeof st !== 'object') st = {};
        st.apps ??= {};   // { app: {mark, ack} }
        st.msgs ??= {};   // { contactId: {mark, ack} }
        st.meta ??= {};   // { calendarDay, garageAfford }
        return st;
      };
      const notifSave = (st) => { try { localStorage.setItem(NOTIF_KEY, JSON.stringify(st)); } catch (_) {} };
      // One dot element per badged tile, children of #phone-menu so they
      // share the art's stacking context and coverState transform.
      const notifDots = {};
      NOTIF_APPS.forEach(a => {
        const d = document.createElement('div');
        d.className = 'notif-dot';
        d.dataset.for = a;
        document.getElementById('phone-menu').appendChild(d);
        notifDots[a] = d;
      });
      // Center each dot on its tile's top-right corner using the SAME
      // data-px → coverState math as the hit zones, so the badges stay
      // glued to the artwork at any device scale.
      const positionNotifDots = () => {
        if (!coverState) return;
        NOTIF_APPS.forEach(a => {
          const btn = document.querySelector(`.phone-hit[data-action="${a}"]`);
          if (!btn || !btn.dataset.px) return;
          const [px, py, pw] = btn.dataset.px.split(/\s+/).map(Number);
          // 22px dot whose UPPER-RIGHT corner sits where the original 14px
          // centered dot's upper-right corner was (corner+7, corner-7) —
          // size changes grow/shrink it inward/down, never past the tile.
          notifDots[a].style.left = (coverState.offX + (px + pw) * coverState.scale + 7 - 22) + 'px';
          notifDots[a].style.top  = (coverState.offY +  py       * coverState.scale - 7) + 'px';
        });
      };
      // Garage "newly actionable" check — how many part upgrades on the
      // current car the player can afford RIGHT NOW.  Compared against the
      // count snapshotted at last Garage open; growth = red dot.  (Cheap by
      // design: current vehicle's slots only, computed on menu show.)
      const garageAffordCount = () => {
        try {
          const cash = window.__upgrades?.cash?.() ?? 0;
          const cur  = window.__garage?.current?.();
          if (!cur) return 0;
          return (window.__upgrades?.slots?.(cur) ?? [])
            .filter(s => s.next && cash >= s.next.cost).length;
        } catch (_) { return 0; }
      };
      // "There's a daily up today" marker — its calendar day, or '' on
      // weekends (no daily → day rollover alone shouldn't badge).
      const calendarDayMark = () => {
        try { return window.__daily?.today?.() ? new Date().toDateString() : ''; }
        catch (_) { return ''; }
      };
      // Does contact `cid`'s thread have any real message content?  Buddy
      // threads come from the game bridge; the Crush only counts once texted.
      const msgHasContent = (cid) => {
        try {
          if (cid === 'girl') return !!window.__girl?.status?.()?.everTexted;
          const t = window.__buddytexts?.threads?.()?.[cid];
          return Array.isArray(t) && t.length > 0;
        } catch (_) { return false; }
      };
      const refreshNotifDots = () => {
        const st   = notifLoad();
        const pend = (a) => { const e = st.apps[a]; return !!e && (e.mark || 0) > (e.ack || 0); };
        const on   = {};
        // Tutorial: until it's been opened once ever (same flag as tut-flash).
        try {
          on.tutorial = !localStorage.getItem('rtr_tutorialSeen') && !localStorage.getItem('dui_tutorialSeen');
        } catch (_) { on.tutorial = false; }
        on.trophy   = pend('trophy');                       // new trophy earned
        on.maps     = pend('maps');                         // new rest stop reached
        const dayMark = calendarDayMark();
        on.calendar = pend('calendar')                      // daily finished (pass/fail)
          || (!!dayMark && dayMark !== (st.meta.calendarDay || ''));  // new day's run up
        on.garage   = pend('garage')
          || garageAffordCount() > (st.meta.garageAfford || 0);       // newly affordable
        // Any unread thread — but only threads that actually CONTAIN messages
        // (a bump with no visible text, e.g. an event fired before the thread
        // has content, must not light the tile).
        on.messages = Object.entries(st.msgs)
          .some(([cid, e]) => (e.mark || 0) > (e.ack || 0) && msgHasContent(cid));
        NOTIF_APPS.forEach(a => { notifDots[a].style.display = on[a] ? 'block' : 'none'; });
      };
      window.__notif = {
        // Game-side: "app X has something new" (1-liners at the event sites).
        bump: (app) => {
          const st = notifLoad();
          (st.apps[app] ??= {}).mark = Date.now();
          notifSave(st); refreshNotifDots();
        },
        // Game-side: a text arrived on contact `cid`'s thread.
        bumpMsg: (cid) => {
          const st = notifLoad();
          (st.msgs[cid] ??= {}).mark = Date.now();
          notifSave(st); refreshNotifDots();
        },
        // Menu-side: the app was opened — clear its dot (and snapshot the
        // computed baselines for the derived garage/calendar checks).
        ack: (app) => {
          const st = notifLoad();
          const e  = (st.apps[app] ??= {});
          e.ack = Math.max(e.mark || 0, Date.now());
          if (app === 'calendar') st.meta.calendarDay  = calendarDayMark();
          if (app === 'garage')   st.meta.garageAfford = garageAffordCount();
          notifSave(st); refreshNotifDots();
        },
        // Menu-side: a message THREAD was opened (reading clears it).
        ackMsg: (cid) => {
          const st = notifLoad();
          const e  = (st.msgs[cid] ??= {});
          e.ack = Math.max(e.mark || 0, Date.now());
          notifSave(st); refreshNotifDots();
        },
        // Query-side: does contact `cid`'s thread have unread texts?
        // (Contacts list uses this for its per-thread red dots.)
        unreadMsg: (cid) => {
          const e = notifLoad().msgs[cid];
          return !!e && (e.mark || 0) > (e.ack || 0) && msgHasContent(cid);
        },
        refresh: () => refreshNotifDots(),
      };

      // Custom motion-permission explainer shown BEFORE the bare iOS
      // "Access Motion and Orientation" prompt (whose wording is OS-locked).
      // The game calls show(onAllow, onCancel); the "Continue" tap is the user
      // gesture that actually fires DeviceOrientationEvent.requestPermission
      // (the native orientation gate).
      (function () {
        let el = null;
        function build() {
          el = document.createElement('div');
          el.id = 'tilt-explainer';
          el.innerHTML =
            '<div class="te-card">'
          +   '<div class="te-icon">📱</div>'
          +   '<div class="te-title">Game Feature Opportunity</div>'
          +   '<div class="te-body">If you would like to experience unique gameplay, press '
          +     '<b>Continue</b> and Allow Motion for Tilt Steering in situations.</div>'
          +   '<div class="te-btns">'
          +     '<button type="button" class="te-cancel">Not now</button>'
          +     '<button type="button" class="te-allow">Continue</button>'
          +   '</div>'
          + '</div>';
          document.body.appendChild(el);
        }
        window.__tiltExplainer = {
          show(onAllow, onCancel) {
            if (!el) build();
            const allow = el.querySelector('.te-allow');
            const cancel = el.querySelector('.te-cancel');
            let done = false;
            // Bind on pointerup (NOT click): the game's tap handler
            // preventDefault()s the touch, which suppresses the synthetic click
            // and left the popup un-dismissable. pointerup still fires, and
            // it's a valid user gesture for requestPermission. click is a
            // desktop fallback; `done` guards against a double-fire.
            const bind = (btn, cb) => {
              const handler = (ev) => {
                if (done) return;
                if (ev) { ev.preventDefault(); ev.stopPropagation(); }
                done = true;
                el.classList.remove('on');
                try { cb && cb(); } catch (_) {}
              };
              btn.onpointerup = handler;
              btn.onclick = handler;
            };
            bind(allow, onAllow);
            bind(cancel, onCancel);
            el.classList.add('on');
          },
        };
      })();

      // "Rotate Phone to Enter Game Play" — a blinking prompt shown on the
      // portrait menu after the tutorial genre pick. Dismisses on rotate-to-
      // landscape (gameplay entry) or a tap.
      (function () {
        let el = null, onRot = null, onRotateCb = null;
        function hide() {
          if (el) { el.classList.remove('on', 'tut'); el.style.pointerEvents = ''; }
          onRotateCb = null;
          if (onRot) {
            window.removeEventListener('orientationchange', onRot);
            window.removeEventListener('resize', onRot);
            onRot = null;
          }
        }
        function build() {
          el = document.createElement('div');
          el.id = 'rotate-play-prompt';
          el.innerHTML = '<span class="rpp-icon">🔄</span><span>Rotate Phone to<br>Enter Game Play</span>';
          document.body.appendChild(el);
          el.addEventListener('click', hide);   // non-tutorial: tap dismisses

        // { onRotate } → fired once when the player actually rotates to landscape.
        window.__rotatePrompt = {
          show(opts) {
            opts = opts || {};
            if (!el) build();
            el.classList.toggle('tut', !!opts.tutorial);
            el.style.pointerEvents = opts.tutorial ? 'none' : '';
            el.classList.add('on');
            onRotateCb = typeof opts.onRotate === 'function' ? opts.onRotate : null;

              onRot = () => {
                try {
                  if (window.matchMedia('(orientation: landscape)').matches) {
                    const cb = onRotateCb; hide(); if (cb) cb();

              };
              window.addEventListener('orientationchange', onRot);
              window.addEventListener('resize', onRot);
            }
          },
          hide,
        };

      // Run on load, on resize, on orientation change.

      // wrong height for a few hundred ms while the status bar / safe

      // second so the PNG cover-fit + hit-zone positions match the
      // final viewport, not the transient cold-launch one.  Also
      // listen to visualViewport.resize which fires when iOS finally
      // commits to the real dimensions.
      const settleLayout = () => {
        // Force a reflow so cover-fit recomputes against current dims.
        void document.documentElement.offsetHeight;

      // ── Per-car phone-menu background ─────────────────────────────────

      // Default skin = the BEATER (starter car), not the generic art (which

      const PHONE_BG_DEFAULT = 'assets/ui/iphone_menu_bg_beater.png';
      const phoneBgUrl = (id) => id ? `assets/ui/iphone_menu_bg_${id}.png` : PHONE_BG_DEFAULT;
      const setPhoneMenuBg = (id) => {
        if (!bgImg) return;

        // Missing per-car skin → fall back to the shared default art.
        bgImg.onerror = () => {
          bgImg.onerror = null;

            bgImg.addEventListener('load', layoutHitZones, { once: true });
            bgImg.src = PHONE_BG_DEFAULT;

      const syncMenuBg = () => {

      // Modal-close helper — call this whenever a modal is dismissed.
      // Briefly disables .phone-hit pointer events so the iOS-style
      // ghost click that fires after pointerup can't trigger the
      // hit-zone underneath the close button (e.g. closing the music
      // modal would otherwise drop a click on START OVER below it).
      const markModalClosing = () => {
        document.body.classList.add('modal-closing');
        setTimeout(() => document.body.classList.remove('modal-closing'), 500);
        // Belt-and-suspenders for the iOS "ghost click": after a touch,
        // Safari fires a synthetic `click` ~300 ms later at the same screen
        // spot.  When a modal/confirm button is gone by then, that click
        // lands on whatever menu hit-zone is now UNDERNEATH it — e.g.
        // tapping Continue/Cancel on a confirm also fired the button behind
        // it.  Swallow the very next click (capture phase, anywhere) so it
        // can't reach any handler.  Real taps are unaffected — the menu
        // acts on `pointerup`, which already fired before this click.
        const cleanup = () => {
          document.removeEventListener('click', swallow, true);
          clearTimeout(t);
        };
        const swallow = (e) => { e.preventDefault(); e.stopPropagation(); cleanup(); };
        const t = setTimeout(cleanup, 700);
        document.addEventListener('click', swallow, true);
      };

      // iOS Safari occasionally drops the synthetic `click` event for
      // empty <button> elements inside touch-action: none containers.
      // Attaching `pointerup` AND `click` (with a 350 ms debounce) makes
      // every menu button work reliably on iPhone AND desktop.
      const addTap = (el, handler) => {
        if (!el) return;
        let last = 0;
        const wrap = (e) => {
          e.preventDefault(); e.stopPropagation();
          const now = Date.now();
          if (now - last < 350) return;
          last = now;
          handler(e);
        };
        el.addEventListener('pointerup', wrap, { passive: false });
        el.addEventListener('click',     wrap, { passive: false });
      };

      // Same idea as addTap but distinguishes a short tap from a
      // long-press.  pointerdown starts a 500ms timer; if pointerup
      // arrives before the timer fires, `onTap` runs.  If the timer
      // fires first, `onHold` runs and the subsequent pointerup is
      // swallowed so the tap handler doesn't also trigger.
      const addLongTap = (el, onTap, onHold, holdMs = 500) => {
        if (!el) return;
        let holdTimer = null;
        let holdFired = false;
        let lastFire  = 0;
        el.addEventListener('pointerdown', () => {
          holdFired = false;
          if (holdTimer) clearTimeout(holdTimer);
          holdTimer = setTimeout(() => {
            holdFired = true;
            holdTimer = null;
            if (onHold) onHold();
          }, holdMs);
        }, { passive: false });
        const endHold = (e) => {
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
          e.preventDefault(); e.stopPropagation();
          if (holdFired) { holdFired = false; return; }
          const now = Date.now();
          if (now - lastFire < 350) return;
          lastFire = now;
          if (onTap) onTap();
        };
        const cancel = () => {
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
          holdFired = false;
        };
        el.addEventListener('pointerup',     endHold, { passive: false });
        el.addEventListener('pointercancel', cancel);
        el.addEventListener('pointerleave',  cancel);
      };

      // ── Lock button ──────────────────────────────────────────────────
      const lockBtn = document.getElementById('phone-lock');
      const applyLock = () => {
        const locked = !!(window.__phoneLock?.get?.());
        lockBtn.classList.toggle('locked', locked);
        lockBtn.textContent = locked ? '🔒' : '🔓';
        lockBtn.setAttribute('aria-pressed', String(locked));
        // Keep the portrait menu visible even in landscape while
        // locked — body class overrides the orientation media query.
        document.body.classList.toggle('menu-locked', locked);
      };
      addTap(lockBtn, () => {
        const cur = !!(window.__phoneLock?.get?.());
        window.__phoneLock?.set?.(!cur);
        applyLock();
      });

      // ── Handedness toggle ────────────────────────────────────────────
      // 👈 = left-handed (default, weapons on left edge);
      // 👉 = right-handed (weapons on right edge).
      const handBtn = document.getElementById('phone-hand');
      const applyHand = () => {
        const h = window.__handedness?.get?.() ?? 'left';
        handBtn.textContent = (h === 'left') ? '👈' : '👉';
        handBtn.setAttribute('aria-pressed', h === 'right' ? 'true' : 'false');
      };
      addTap(handBtn, () => {
        window.__handedness?.toggle?.();
        applyHand();
      });

      // ── Steering selection highlight ──────────────────────────────────
      // 'flappy' (tap), 'tilt', 'classic' (L/R) — map to the matching
      // .phone-hit.  The gameplay code calls the two-thumb mode
      // "classic"; keeping "lr" here made the phone UI disagree with
      // the scene/save mode names.
      const STEER_BUTTONS = { tap: 'flappy', tilt: 'tilt', lr: 'classic' };
      const applySteering = () => {
        // Defensive sweep — wipe any stale .selected from EVERY hit
        // zone first, then apply only to the active steering button.
        // Prevents leftover state on Maps / Music / etc. from showing
        // the black stroke.
        document.querySelectorAll('.phone-hit.selected').forEach(b => b.classList.remove('selected'));
        const cur = window.__steeringMode?.get?.() ?? 'flappy';
        for (const [el, mode] of Object.entries(STEER_BUTTONS)) {
          if (cur !== mode) continue;
          const btn = document.querySelector(`.phone-hit[data-action="${el}"]`);
          if (btn) btn.classList.add('selected');
        }
        // Move the visual ring onto the now-selected button's
        // artwork rect (data-ring-px), independent of its tap zone.
        positionSelectionRing();
      };
      // pointerup (not click) — iOS Safari sometimes drops synthetic
      // click events on empty <button> elements inside touch-action:
      // none containers.  pointerup fires reliably for both mouse +
      // touch.  Guard against double-firing if a desktop click also
      // arrives by checking a recent-fire timestamp.
      let _lastSteerFire = 0;
      // Promise wrapper around the centered confirm modal.  Resolves
      // true on Continue, false on Cancel.  Listeners are attached per
      // call and removed on close so the handler can't double-fire.
      const confirmModal  = document.getElementById('phone-confirm');
      const confirmMsg    = confirmModal?.querySelector('.msg');
      const confirmOk     = document.getElementById('phone-confirm-ok');
      const confirmCancel = document.getElementById('phone-confirm-cancel');
      const showConfirm = (message) => new Promise(resolve => {
        // Close any stale confirm still open first — prevents double-bound
        // OK/Cancel listeners (which broke re-opening the controls editor after
        // a Cancel, because the editor had opened behind a lingering popup).
        if (window.__activeConfirmClose) { try { window.__activeConfirmClose(); } catch (_) {} }
        if (confirmMsg && message) confirmMsg.textContent = message;
        const close = (val) => {
          confirmModal.classList.remove('open');
          // Suppress the iOS ghost click — without this, pressing
          // Continue on the Start Over confirm would also fire the
          // Tilt Steer (or whichever) button underneath where the
          // Continue button was.
          markModalClosing();
          confirmOk.removeEventListener('pointerup', okHandler);
          confirmOk.removeEventListener('click',     okHandler);
          confirmCancel.removeEventListener('pointerup', cancelHandler);
          confirmCancel.removeEventListener('click',     cancelHandler);
          window.__activeConfirmClose = null;
          resolve(val);
        };
        const okHandler     = (e) => { e.preventDefault(); e.stopPropagation(); close(true);  };
        const cancelHandler = (e) => { e.preventDefault(); e.stopPropagation(); close(false); };
        confirmOk.addEventListener('pointerup', okHandler,     { passive: false });
        confirmOk.addEventListener('click',     okHandler,     { passive: false });
        confirmCancel.addEventListener('pointerup', cancelHandler, { passive: false });
        confirmCancel.addEventListener('click',     cancelHandler, { passive: false });
        // Programmatic dismissal (e.g. the controls editor opening on rotate)
        // closes this confirm cleanly as if OK — so it never lingers over the
        // editor or double-binds these listeners on the next open.
        window.__activeConfirmClose = () => close(true);
        confirmModal.classList.add('open');
      });
      const handleSteerSelect = (btn) => async (e) => {
        e.preventDefault(); e.stopPropagation();

        if (now - _lastSteerFire < 350) return;
        _lastSteerFire = now;

        const current = window.__steeringMode?.get?.() ?? 'flappy';

          window.__phaserGame?.registry?.set?.('titleThumbsPick', 'tilt');
        }

        // Game scene, ending the active run.
        const ok = await showConfirm('Modifying your steering controls will end your current game.');
        if (!ok) {
          if (mode === 'tilt') {
            window.__phaserGame?.registry?.set?.('titleThumbsPick', current);
          }
          return;
        }

        // button.  Doesn't depend on the game-side get()
        // returning the new value (scene.restart inside set()
        // can interfere with that read on iOS).
        document.querySelectorAll('.phone-hit.selected').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        positionSelectionRing();
        // Then push to the game.
        window.__steeringMode?.set?.(mode);
      };
      document.querySelectorAll('.phone-hit[data-action="tap"], .phone-hit[data-action="tilt"], .phone-hit[data-action="lr"]')
        .forEach(btn => {
          const h = handleSteerSelect(btn);
          btn.addEventListener('pointerup', h, { passive: false });
          btn.addEventListener('click',     h, { passive: false });
        });

      // ── In-world road-trip clock over the Calendar ────────────────────
      // Driven by MILES DRIVEN (not real time): the 293-mi route spans
      // 2:00 PM → 7:00 PM, plus scaled rest-stop time. The Phaser side owns
      // the math (_worldClockLabel); this just reads it each tick.
      const clockEl = document.getElementById('phone-clock');
      const formatPhoneTime = () => {
        const scene = window.__phaserGame?.scene?.getScene?.('Game');
        if (!scene || typeof scene._worldClockLabel !== 'function') return '— : — PM';
        try { return scene._worldClockLabel(); } catch (_) { return '— : — PM'; }
      };
      // ── Top weather widget — location name + temp + weather symbol ────
      const locEl  = document.getElementById('phone-loc');
      const tempEl = document.getElementById('phone-temp');
      const wxEl   = document.getElementById('phone-wx');
      const WX_SYMBOL = { clear: '☀️', rain: '🌧️', snow: '❄️' };
      const updateWeatherWidget = () => {
        const L = window.__location?.get?.();
        if (!L) return;
        if (locEl)  locEl.textContent  = (L.name || '').toUpperCase();
        if (tempEl) tempEl.textContent = `${L.tempF}°`;
        if (wxEl)   wxEl.textContent   = WX_SYMBOL[L.weather] || '☀️';
      };

      const tickClock = () => {
        clockEl.textContent = formatPhoneTime();
        updateWeatherWidget();
        // Sync the 🔇 badge on the music tile with whatever the game
        // currently thinks audio.muted is, so the in-game pause-menu
        // mute and the long-press mute stay visually linked.
        if (typeof applyMusicMutedIndicator === 'function') applyMusicMutedIndicator();
      };
      setInterval(tickClock, 1000);
      updateWeatherWidget();

      // ── Map modal ─────────────────────────────────────────────────────
      const mapModal   = document.getElementById('phone-map');
      const mapSvg     = document.getElementById('phone-map-svg');
      const mapMile    = document.getElementById('phone-map-mile');
      const mapStops   = document.getElementById('phone-map-stops');
      const mapClose   = document.getElementById('phone-map-close');
      // Amenity → business logo PNG (west/east brand split, matching the
      // rest-stop screens: CarGo/Huff's gas, Lord/SUCK dealer, etc.).
      // Filenames + display names mirror RestStopScene's brandsForStop()
      // and AssetManifest (biz_* keys → public/assets/businesses/*.png).
      const BIZ_LOGO = (a, isWest) => ({
        gas:     isWest ? { file: 'cargo.png', name: 'CarGo' }
                        : { file: 'huffs.png', name: "Huff's Gas" },
        hunting: { file: 'cowbellas.png',      name: 'CowBella' },
        camp:    { file: 'aok.png',            name: 'AOK Camp' },
        dealer:  isWest ? { file: 'lord.png',  name: 'Lord Motors' }
                        : { file: 'suck.png',  name: "Sam's Used Car Kingdom" },
        vices:   { file: 'gasnsip.png',        name: 'Gas-N-Sip' },
        ambm:    { file: 'am_bm.png',          name: 'AM/BM' },
        parkride: { file: 'park-and-ride.png', name: 'Metro Park & Ride' },
      }[a] || null);
      // I-90 → WA-26 → US-195 → WA-270 waypoints (mile, lat, lon).
      const WAYPOINTS = [
        [  0, 47.580, -122.390],
        [  5, 47.598, -122.330],
        [9.5, 47.570, -122.222],
        [12.5,47.611, -122.180],
        [ 18, 47.530, -122.033],
        [ 25, 47.528, -121.825],
        [ 32, 47.493, -121.789],
        [ 53, 47.424, -121.413],
        [ 70, 47.243, -121.187],
        [ 84, 47.196, -120.937],
        [101, 47.071, -120.661],
        [109, 46.995, -120.547],
        [137, 46.948, -119.978],
        [158, 46.904, -119.629],
        [184, 46.826, -119.176],
        [205, 46.759, -118.825],
        [228, 46.755, -118.310],
        [253, 46.810, -117.873],
        [274, 46.877, -117.364],
        [289, 46.731, -117.180],
      ];
      const STOPS = [
        { mile:   5, name: 'Seattle' },
        { mile: 9.5, name: 'Mercer Island' },
        { mile:12.5, name: 'Bellevue' },
        { mile:  18, name: 'Issaquah' },
        { mile:  25, name: 'Snoqualmie' },
        { mile:  32, name: 'North Bend' },
        { mile:  53, name: 'Snoqualmie Pass' },
        { mile:  70, name: 'Easton' },
        { mile:  84, name: 'Cle Elum' },
        { mile: 101, name: 'Thorp' },
        { mile: 109, name: 'Ellensburg' },
        { mile: 137, name: 'Vantage' },
        { mile: 158, name: 'Royal City' },
        { mile: 184, name: 'Othello' },
        { mile: 205, name: 'Hatton' },
        { mile: 228, name: 'Washtucna' },
        { mile: 253, name: 'La Crosse' },
        { mile: 274, name: 'Colfax' },
        { mile: 289, name: 'Pullman' },
      ];
      // Pre-compute lat/lon bounds.  The ~290-mile route runs mostly W→E,
      // so we lay it out VERTICALLY on the tall portrait SVG to use the
      // height: longitude → vertical axis (start at top, end at bottom),
      // latitude → horizontal axis with NORTH facing RIGHT.  That's a
      // 90°-clockwise rotation of a standard north-up map (north→right,
      // east→down), which is geographically correct and gives the route
      // far more room than cramming it across the narrow width.
      let mapBounds = null;
      const fitMap = () => {
        let latMin = Infinity, latMax = -Infinity, lonMin = Infinity, lonMax = -Infinity;
        for (const [, lat, lon] of WAYPOINTS) {
          if (lat < latMin) latMin = lat;  if (lat > latMax) latMax = lat;
          if (lon < lonMin) lonMin = lon;  if (lon > lonMax) lonMax = lon;
        }
        mapBounds = {
          latMin, latMax, lonMin, lonMax,
          latSpan: (latMax - latMin) || 0.001,
          lonSpan: (lonMax - lonMin) || 0.001,
        };
      };
      fitMap();
      const project = (lat, lon) => {
        // viewBox 100×200.  Single scale (no distortion) so the route keeps
        // its true shape, just rotated 90° CW.
        const padX = 16, padTop = 20, padBot = 14;
        const innerW = 100 - padX * 2;
        const innerH = 200 - padTop - padBot;
        const s = Math.min(innerW / mapBounds.latSpan, innerH / mapBounds.lonSpan);
        const latMid = (mapBounds.latMin + mapBounds.latMax) / 2;
        const x = 50 + (lat - latMid) * s;                  // north (+lat) → right
        const y = padTop + (lon - mapBounds.lonMin) * s;    // west→top, east→bottom
        return [x, y];
      };
      const milePoint = (m) => {
        // Linear interp between waypoint pairs.
        for (let i = 0; i < WAYPOINTS.length - 1; i++) {
          const [m0, la0, lo0] = WAYPOINTS[i];
          const [m1, la1, lo1] = WAYPOINTS[i+1];
          if (m >= m0 && m <= m1) {
            const t = (m - m0) / Math.max(0.001, m1 - m0);
            return project(la0 + (la1 - la0) * t, lo0 + (lo1 - lo0) * t);
          }
        }
        return project(...WAYPOINTS[WAYPOINTS.length - 1].slice(1));
      };
      const renderMap = () => {
        // Build the polyline + rest stop dots + player dot.
        const pathPts = [];
        for (let i = 0; i < WAYPOINTS.length - 1; i++) {
          const [m0, la0, lo0] = WAYPOINTS[i];
          const [m1, la1, lo1] = WAYPOINTS[i+1];
          const span = m1 - m0;
          const steps = Math.max(1, Math.ceil(span / 5));
          for (let k = 0; k <= steps; k++) {
            const t = k / steps;
            pathPts.push(project(la0 + (la1 - la0) * t, lo0 + (lo1 - lo0) * t));
          }
        }
        const d = pathPts.map(([x, y], i) => (i ? 'L' : 'M') + x.toFixed(2) + ' ' + y.toFixed(2)).join(' ');
        const mileNow = ((window.__phaserGame?.scene?.getScene?.('Game')?._odometer) ?? 0);
        const [px, py] = milePoint(mileNow);
        // Greedy vertical de-confliction: tight clusters (the Seattle metro
        // stops) would otherwise stack their labels on top of one another, so
        // nudge each label below the previous one ON THE SAME SIDE and draw a
        // faint leader back to its dot.  STOPS are in mile order = increasing
        // y, so a single top-to-bottom pass per side suffices.
        const lastLabelY = { start: -Infinity, end: -Infinity };
        const LABEL_GAP = 3.0;
        const stopsSvg = STOPS.map(s => {
          const [sx, sy] = milePoint(s.mile);
          // Dot on the left half → label to its right; right half → left,
          // so names don't run off either edge of the narrow SVG.
          const onLeft = sx <= 50;
          const lx = onLeft ? sx + 2.5 : sx - 2.5;
          const anchor = onLeft ? 'start' : 'end';
          let ly = sy + 0.9;
          if (ly - lastLabelY[anchor] < LABEL_GAP) ly = lastLabelY[anchor] + LABEL_GAP;
          lastLabelY[anchor] = ly;
          const leader = (ly - (sy + 0.9) > 0.4)
            ? `<line x1="${sx.toFixed(2)}" y1="${sy.toFixed(2)}" x2="${lx.toFixed(2)}" y2="${(ly - 0.9).toFixed(2)}" stroke="#FFFFFF" stroke-width="0.25" opacity="0.4"/>`
            : '';
          // Transparent larger hit circle for easy tapping (Custom-only warp).
          return `${leader}<circle class="map-warp-hit" data-mile="${s.mile}" cx="${sx.toFixed(2)}" cy="${sy.toFixed(2)}" r="3.4" fill="transparent" style="cursor:pointer"/>
                  <circle cx="${sx.toFixed(2)}" cy="${sy.toFixed(2)}" r="1.4" fill="#FFE066" stroke="#000" stroke-width="0.4"/>
                  <text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" font-size="2.6" fill="#FFFFFF" font-family="Helvetica" text-anchor="${anchor}">${s.name}</text>`;
        }).join('');
        // Compass needle (top-left) — north is to the RIGHT on this rotated
        // map, so the RED (north) half points right, the pale half left, and
        // the N is red like a real compass.
        const compass = `
          <g opacity="0.95">
            <polygon points="12,11.7 18.4,13 12,14.3" fill="#FF2244"/>
            <polygon points="12,11.7 5.6,13 12,14.3" fill="#E8ECF2"/>
            <circle cx="12" cy="13" r="0.9" fill="#0a0f1a" stroke="#FFFFFF" stroke-width="0.3"/>
            <text x="19.4" y="14.3" font-size="3.6" fill="#FF2244" font-family="Helvetica" font-weight="bold">N</text>
          </g>`;
        mapSvg.innerHTML = `
          <path d="${d}" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          ${stopsSvg}
          ${compass}
          <circle cx="${px}" cy="${py}" r="3" fill="#FF2244" stroke="#FFF" stroke-width="0.8">
            <animate attributeName="r" values="3;4.2;3" dur="1s" repeatCount="indefinite"/>
          </circle>
          <text x="${px}" y="${(py - 5).toFixed(2)}" font-size="3" fill="#FF6688" stroke="#000" stroke-width="0.6" paint-order="stroke" font-family="Helvetica" font-weight="bold" text-anchor="middle">Mile ${Math.round(mileNow)}</text>
        `;
        mapMile.textContent = `Mile ${Math.round(mileNow)} / 293`;
        // Next rest stop ahead — business logos stacked vertically on the
        // right of the map under an underlined "NEXT REST STOP" title.
        if (mapStops) {
          const stops = (window.__restStops || []);
          const next  = stops.find(s => (s.mileage ?? 0) > mileNow + 0.3);
          const isWest = (next?.mileage ?? 0) < 100;
          const logos = !next ? [] : (next.amenities || [])
            .map(a => BIZ_LOGO(a, isWest)).filter(Boolean);
          if (next && logos.length) {
            // onerror fallback: if a logo file ever goes missing, hide the
            // broken-image icon and show the brand name as text instead.
            mapStops.innerHTML = `<div class="np-title">NEXT REST STOP</div>`
              + logos.map(b =>
                  `<img src="assets/businesses/${b.file}" alt="${b.name}" `
                + `onerror="this.style.display='none';`
                + `var t=document.createElement('div');t.textContent=this.alt;`
                + `t.style.cssText='color:#FFE066;font:bold 2.4vmin Helvetica,Arial,sans-serif;text-align:center;';`
                + `this.parentNode.insertBefore(t,this.nextSibling)">`).join('');
            mapStops.style.display = 'flex';
          } else {
            mapStops.innerHTML = '';
            mapStops.style.display = 'none';
          }
        }
      };
      const openMap = () => { window.__notif?.ack?.('maps'); mapModal.classList.add('open'); renderMap(); };
      const closeMap = () => { mapModal.classList.remove('open'); markModalClosing(); };
      addTap(mapClose, closeMap);
      addTap(document.querySelector('.phone-hit[data-action="maps"]'), openMap);
      // Tap a stop on the map to teleport there (Custom mode only).  Delegated
      // on the persistent SVG element (renderMap rewrites its innerHTML).
      const mapWarpToast = (msg, good) => {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;left:50%;bottom:14%;transform:translateX(-50%);z-index:100001;'
          + 'background:#04101e;color:' + (good ? '#66FF99' : '#FFAA66') + ';border:2px solid '
          + (good ? '#66FF99' : '#FFAA66') + ';border-radius:10px;padding:12px 22px;'
          + 'font-family:Helvetica,Arial,sans-serif;font-size:15px;font-weight:bold;';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1800);
      };
      mapSvg.addEventListener('click', (ev) => {
        const hit = ev.target?.closest?.('.map-warp-hit');
        if (!hit) return;
        const mile = Number(hit.getAttribute('data-mile'));
        if (!Number.isFinite(mile)) return;
        const res = window.__warpTo?.(mile);
        if (res?.ok) { mapWarpToast('✓ Warped to mile ' + Math.round(mile), true); renderMap(); }
        else if (res?.reason === 'not-custom') mapWarpToast('Teleport is Custom-mode only', false);
        else mapWarpToast('No active run to warp', false);
      });
      // While the modal is open, re-render the player dot every 2 s so
      // the dot tracks live mileage if the game is mid-pause.
      setInterval(() => { if (mapModal.classList.contains('open')) renderMap(); }, 2000);

      // ── Garage modal ──────────────────────────────────────────────────
      const garageModal = document.getElementById('phone-garage');
      const garageList  = document.getElementById('phone-garage-list');
      const garageClose = document.getElementById('phone-garage-close');
      const renderGarage = () => {
        const cars = window.__garage?.list?.() ?? [];
        const carsHtml = cars.map(c => {
          const accLabels = [];
          if (c.accessories.bumper)   accLabels.push('<span class="badge">🛡 Bumper</span>');
          if (c.accessories.nos > 0)  accLabels.push(`<span class="badge">⚡ NOS L${c.accessories.nos}</span>`);
          if (c.accessories.traction) accLabels.push('<span class="badge">❄️ Traction</span>');
          const accRow = accLabels.length ? accLabels.join('') : '<span style="color:#557;">— no accessories —</span>';
          const imgHtml = c.imageUrl
            ? `<img class="car-img" src="${c.imageUrl}" alt="${c.label}" onerror="this.style.display='none'"/>`
            : `<div class="car-img" style="background:#${(c.tint).toString(16).padStart(6,'0')}; width:22%; height:8vmin; border-radius:4px;"></div>`;
          return `<div class="row ${c.current ? 'current' : ''}" data-id="${c.id}">
            <div style="display:flex; flex-direction:column; align-items:center; width:30%;">
              <div class="acc">${accRow}</div>
              ${imgHtml}
            </div>
            <div class="info">
              <div class="name">${c.label}${c.current ? ' ★' : ''}</div>
              <div class="stats">${c.hp} HP · ${c.rangeMi} mi · ${c.topMph} mph · ${c.drive} · ${c.fuel}</div>
            </div>
          </div>`;
        }).join('');

        // ── Upgrades + player-facing stats panel for the CURRENT car ──────
        const curId = cars.find(c => c.current)?.id ?? cars[0]?.id;
        let panelHtml = '';
        if (curId && window.__upgrades) {
          const cash  = window.__upgrades.cash();
          const stats = window.__upgrades.stats(curId);
          const slots = window.__upgrades.slots(curId);
          const ORDER = ['grip','steering','stability','braking','durability','cooling','visibility','range'];
          const bar = (n) => `<span style="letter-spacing:1px;color:#39D9FF">${'▮'.repeat(n)}</span>`
                            + `<span style="letter-spacing:1px;color:#26384a">${'▮'.repeat(5-n)}</span>`;
          // Legibility pass (2026-07-13): upgrade text ~3× its old size
          // (2.5/2.0/1.9vmin → 7/5.6/5.2vmin), stat meters 2× (2.3 → 4.6vmin)
          // so the two-column grid still fits; the modal already scrolls.
          const statsHtml = ORDER.map(k => `<div style="display:flex;justify-content:space-between;gap:6px;font-size:4.6vmin;">`
            + `<span style="color:#9fb7d6;text-transform:capitalize;">${k}</span><span>${bar(stats[k]?.bars ?? 0)}</span></div>`).join('');
          const slotsHtml = slots.map(s => {
            const owned = s.installedLabel
              ? `<span style="color:#66FF99">L${s.installedLevel} · ${s.installedLabel}</span>`
              : `<span style="color:#5b6b82">stock</span>`;
            let action;
            if (!s.next) action = `<span class="up-max">MAX</span>`;
            else {
              const afford = cash >= s.next.cost;
              action = `<button class="up-buy ${afford?'on':''}" data-veh="${curId}" data-up="${s.next.id}" `
                     + `${afford?'':'disabled'}>$${s.next.cost.toLocaleString()}</button>`;
            }
            return `<div style="padding:2vmin 0;border-top:1px solid #16283a;">`
              + `<div style="display:flex;justify-content:space-between;align-items:center;gap:2vmin;">`
              + `<span style="color:#F4F7FF;font-size:7vmin;">${s.slotLabel}</span>${action}</div>`
              + `<div style="font-size:5.6vmin;">${owned}${s.next?` <span style="color:#5b6b82">→ ${s.next.label}</span>`:''}</div>`
              + (s.next && s.next.tradeoff ? `<div style="font-size:5.2vmin;color:#d9a15a;">⚠ ${s.next.tradeoff}</div>` : '')
              + `</div>`;
          }).join('');
          panelHtml = `<div id="garage-upgrades" style="margin-top:2vmin;padding:2.5vmin;background:#080c16;`
            + `border:2px solid #163550;border-radius:2vmin;">`
            + `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5vmin;">`
            + `<span style="color:#39D9FF;font-weight:bold;font-size:7vmin;">UPGRADES</span>`
            + `<span style="color:#FFD23D;font-size:6.4vmin;">$${cash.toLocaleString()}</span></div>`
            + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 4vmin;margin-bottom:2vmin;">${statsHtml}</div>`
            + slotsHtml + `</div>`;
        }
        garageList.innerHTML = carsHtml + panelHtml;

        garageList.querySelectorAll('.row').forEach(row => {
          row.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            const id = row.dataset.id;
            window.__garage?.select?.(id);
            setPhoneMenuBg(id);   // re-skin the phone menu to the new car
            // Defer the re-paint a frame: renderGarage() rebuilds garageList
            // via innerHTML, destroying THIS row mid-gesture — on iOS that
            // strands the touch and kills game input after returning to play.
            requestAnimationFrame(renderGarage);   // re-paint with new "current"
          });
        });
        // Buy-upgrade buttons — deduct cash, install, re-render.
        garageList.querySelectorAll('.up-buy').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            window.__upgrades?.buy?.(btn.dataset.veh, btn.dataset.up);
            requestAnimationFrame(renderGarage);
          });
        });
      };
      const openGarage  = () => { window.__notif?.ack?.('garage'); renderGarage(); syncMenuBg(); garageModal.classList.add('open'); };
      const closeGarage = () => { garageModal.classList.remove('open'); markModalClosing(); };
      addTap(garageClose, closeGarage);
      addTap(document.querySelector('.phone-hit[data-action="garage"]'), openGarage);

      // ── Checkpoint hit zone — warps to last-reached rest stop ─────────
      addTap(document.querySelector('.phone-hit[data-action="checkpoint"]'), () => {
        const ok = window.__checkpoint?.warpToLast?.();
        if (!ok) {
          // Visual feedback when there is no checkpoint to warp to.
          const btn = document.querySelector('.phone-hit[data-action="checkpoint"]');
          if (btn) {
            btn.classList.add('selected');
            setTimeout(() => btn.classList.remove('selected'), 600);
          }
        }
      });

      // ── Start Over hit zone — restart the run from mile 0 with the
      //    same vehicle.  Confirmation popup first so the player can't
      //    accidentally lose progress.  Game stays paused in portrait;
      //    rotating to landscape arms tap-to-resume the fresh run.
      // Repurposed to SAVE the current run in place (no reset, stay in game).
      // NOTE: the tile ART still reads "START OVER" — it's baked into the menu
      // skin PNGs (iphone_menu_bg_*.png); relabel the art to "SAVE" later.
      addTap(document.querySelector('.phone-hit[data-action="startover"]'), () => {
        const res = window.__saveRun?.();
        const ok = !!(res && res.ok);
        const t = document.createElement('div');
        t.textContent = ok ? '✓ Game saved' : 'No active run to save';
        t.style.cssText = 'position:fixed;left:50%;bottom:14%;transform:translateX(-50%);z-index:100001;'
          + 'background:#04101e;color:' + (ok ? '#66FF99' : '#FFAA66') + ';border:2px solid '
          + (ok ? '#66FF99' : '#FFAA66') + ';border-radius:10px;padding:12px 22px;'
          + 'font:bold 16px Arial,Helvetica,sans-serif;box-shadow:0 8px 28px rgba(0,0,0,.5);'
          + 'pointer-events:none;opacity:0;transition:opacity .15s;';
        document.body.appendChild(t);
        requestAnimationFrame(() => { t.style.opacity = '1'; });
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 250); }, 1400);
      });

      // ── Main Menu hit zone REMOVED (2026-06-19) — the bottom bar reads
      //    "ROTATE PHONE TO ENTER GAME PLAY"; a hit zone there that returned to
      //    the title (losing the run) was confusing.  window.__mainMenu still
      //    exists for any other caller.

      // ── Desktop "enter gameplay" button — the click stand-in for rotating
      //    the phone back to landscape.  Hides the iPhone menu and resumes
      //    the run (window.__phoneMenu.close).  Desktop-only via CSS.
      const enterGameplayBtn = document.getElementById('phone-enter-gameplay');
      if (enterGameplayBtn) {
        enterGameplayBtn.addEventListener('click', (e) => {
          e.preventDefault();
          window.__phoneMenu?.close?.();
        });
      }

      // ── Music app modal ───────────────────────────────────────────────
      const musicModal     = document.getElementById('phone-music');
      const musicTitle     = document.getElementById('phone-music-title');
      const musicBody      = document.getElementById('phone-music-body');
      const musicShuffle   = document.getElementById('phone-music-shuffle');
      const musicShuffleG  = document.getElementById('phone-music-shuffle-genre');
      const musicClose     = document.getElementById('phone-music-close');
      let musicGenreIdx = null;        // null = list view; integer = song view

      // ── Now-playing scrubber — live progress + drag-to-seek ───────────
      const pmnNow  = document.getElementById('phone-music-now');
      const pmnName = document.getElementById('pmn-name');
      const pmnBar  = document.getElementById('pmn-bar');
      const pmnFill = document.getElementById('pmn-fill');
      const pmnKnob = document.getElementById('pmn-knob');
      const pmnCur  = document.getElementById('pmn-cur');
      const pmnDur  = document.getElementById('pmn-dur');
      const fmtMS   = (s) => { s = Math.max(0, Math.floor(s || 0)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };
      let pmnDragging = false;
      const pmnSetPct = (pct) => { pct = Math.max(0, Math.min(100, pct)); pmnFill.style.width = pct + '%'; pmnKnob.style.left = pct + '%'; };
      const pmnFrac = (e) => { const r = pmnBar.getBoundingClientRect(); return Math.max(0, Math.min(1, (e.clientX - r.left) / Math.max(1, r.width))); };
      const pmnTick = () => {
        if (!musicModal.classList.contains('open')) return;
        const p = window.__music?.progress?.();
        if (p && p.duration > 0) {
          pmnNow.style.display = 'block';
          pmnName.textContent = p.name || '♪ Now Playing';
          pmnDur.textContent = fmtMS(p.duration);
          if (!pmnDragging) { pmnSetPct((p.time / p.duration) * 100); pmnCur.textContent = fmtMS(p.time); }
        } else {
          pmnNow.style.display = 'none';
        }
      };
      setInterval(pmnTick, 250);
      const pmnPreview = (e) => {
        const f = pmnFrac(e); pmnSetPct(f * 100);
        const p = window.__music?.progress?.(); if (p) pmnCur.textContent = fmtMS(f * p.duration);
      };
      pmnBar.addEventListener('pointerdown', (e) => { pmnDragging = true; try { pmnBar.setPointerCapture(e.pointerId); } catch (_) {} pmnPreview(e); });
      window.addEventListener('pointermove', (e) => { if (pmnDragging) pmnPreview(e); });
      window.addEventListener('pointerup', (e) => { if (!pmnDragging) return; pmnDragging = false; window.__music?.seek?.(pmnFrac(e)); pmnTick(); });

      const prettyTrack = (url) => {
        // 'assets/music/country/blue_lights.mp3' → 'Blue Lights'
        const f = url.split('/').pop().replace(/\.mp3$/i, '');
        return f.replace(/[_-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      };
      // Cross-genre playlist — ORDERED array of selected track URLs.
      // Pre-filled with EVERY track across every station the first
      // time the music app opens.  Order matters for the Selected
      // view's reorder controls and the PLAY button (plays in
      // playlist order).  `playlistHas` / Add / Remove keep the API
      // close to the old Set so the rest of the renderer didn't
      // change much.
      const playlist = [];
      const playlistHas    = (url) => playlist.indexOf(url) !== -1;
      const playlistAdd    = (url) => { if (!playlistHas(url)) playlist.push(url); };
      const playlistRemove = (url) => { const i = playlist.indexOf(url); if (i !== -1) playlist.splice(i, 1); };
      const playlistMove   = (url, dir) => {
        const i = playlist.indexOf(url);
        if (i === -1) return;
        const j = i + dir;
        if (j < 0 || j >= playlist.length) return;
        [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
      };
      let _playlistInitialized = false;
      const ensurePlaylistDefaults = () => {
        if (_playlistInitialized) return;
        const stations = window.__music?.list?.() ?? [];
        if (!stations.length) return;            // music API not ready yet
        for (const s of stations) for (const t of (s.tracks ?? [])) playlistAdd(t);
        _playlistInitialized = true;
      };
      // View mode — 'main' (genre grid / song list) or 'selected'
      // (flat ordered list of the playlist with reorder arrows).
      let musicView = 'main';
      const _renderMusicNow = () => {
        const stations = window.__music?.list?.() ?? [];
        // If the audio system hasn't registered with the Phaser registry
        // yet (cold-load race between BootScene boot + the player
        // opening the music app), show a loading message and re-render
        // shortly.  After 3 seconds of failed polls we offer a manual
        // retry button — covers the case where Phaser boot stalled
        // (failed module fetch, 404'd asset, etc.) and never finishes.
        if (!stations.length) {
          renderMusic._loadingSince = renderMusic._loadingSince || Date.now();
          const stuckMs = Date.now() - renderMusic._loadingSince;
          musicTitle.textContent = 'MUSIC';
          musicShuffle.style.display    = 'none';
          musicShuffleG.style.display   = 'none';
          musicClose.textContent        = 'CLOSE';
          musicBody.className = '';
          if (stuckMs > 3000) {
            musicBody.innerHTML = `
              <div style="color:#88A; text-align:center; padding:8vmin; font-family:Helvetica;">
                <div style="margin-bottom:3vmin;">Music is taking longer than usual to load.</div>
                <button id="phone-music-retry" style="padding:2vmin 5vmin; background:#FFFFFF; color:#1E5BB8; border:2px solid #000; border-radius:6px; font-family:Impact,sans-serif; font-size:4vmin; cursor:pointer;">RETRY</button>
              </div>`;
            const retryBtn = musicBody.querySelector('#phone-music-retry');
            if (retryBtn) addTap(retryBtn, () => {
              window.__music?.warmup?.();
              renderMusic._loadingSince = 0;
              renderMusic();
            });
          } else {
            musicBody.innerHTML = `<div style="color:#88A; text-align:center; padding:8vmin; font-family:Helvetica;">Loading songs…</div>`;
          }
          clearTimeout(renderMusic._retryTimer);
          renderMusic._retryTimer = setTimeout(() => {
            if (musicModal.classList.contains('open')) renderMusic();
          }, 250);
          return;
        }
        // Audio is ready — clear the "stuck since" marker so future
        // empty renders (which shouldn't happen) get fresh treatment.
        renderMusic._loadingSince = 0;
        const cur      = window.__music?.current?.();
        // Lazy first-open population of the cross-genre playlist set.
        ensurePlaylistDefaults();
        // Bottom button reads CLOSE on the genre grid, BACK in a song
        // list OR the selected view (both pop one level up to the
        // genre grid).
        // Top level (genre grid) → the corner ✕ closes the app, so hide the
        // bottom button.  In a sub-view it becomes a "← BACK" nav button.
        if (musicGenreIdx == null && musicView !== 'selected') {
          musicClose.style.display = 'none';
        } else {
          musicClose.style.display = '';
          musicClose.textContent = '← BACK';
        }
        // Visible scope — Play / Clear only operate on songs the
        // player can currently see.
        let visibleTracks;
        if (musicView === 'selected') {
          visibleTracks = playlist.slice();
        } else if (musicGenreIdx == null) {
          visibleTracks = stations.flatMap(s => s.tracks ?? []);
        } else {
          visibleTracks = stations[musicGenreIdx]?.tracks ?? [];
        }
        const visibleSelected = visibleTracks.filter(t => playlistHas(t));
        // Playlist bar — always shown when there's at least one
        // selection.  Adds a VIEW toggle so the player can flip to a
        // flat ordered list of just their selected songs.
        const plCount = visibleSelected.length;
        const viewLbl = (musicView === 'selected') ? 'GENRES' : 'SELECTED';
        const playlistBar = (plCount > 0 || musicView === 'selected')
          ? `<div class="playlist-bar">
               <div class="count">▶ Playlist: ${playlist.length} song${playlist.length === 1 ? '' : 's'}</div>
               <button id="phone-music-pl-view">${viewLbl}</button>
               <button id="phone-music-pl-play">PLAY</button>
               <button id="phone-music-pl-clear" class="clear">CLEAR</button>
             </div>`
          : '';
        if (musicView === 'selected') {
          // Flat ordered list of selected songs with reorder + remove.
          musicTitle.textContent = 'PLAYLIST';
          musicShuffle.style.display = 'none';
          musicShuffleG.style.display = 'none';
          const tracks = playlist.slice();
          const trackRows = tracks.length
            ? `<div class="song-list">` + tracks.map((url, i) => {
                const stIdx = stations.findIndex(s => (s.tracks ?? []).includes(url));
                const stName = stIdx !== -1 ? (stations[stIdx]?.name ?? '') : '';
                return `<div class="song" data-url="${url}">
                  <div class="reorder">
                    <button class="reorder-btn up"   data-url="${url}" aria-label="Move up"   ${i === 0 ? 'disabled' : ''}>▲</button>
                    <button class="reorder-btn down" data-url="${url}" aria-label="Move down" ${i === tracks.length - 1 ? 'disabled' : ''}>▼</button>
                  </div>
                  <span class="num">${i + 1}</span>
                  <span class="name">${prettyTrack(url)}${stName ? ` <span style="opacity:0.55;font-size:2.4vmin;">· ${stName}</span>` : ''}</span>
                  <button class="song-check checked" data-url="${url}" aria-label="Remove from playlist">✓</button>
                </div>`;
              }).join('') + `</div>`
            : `<div style="color:#88A; text-align:center; padding:6vmin;">No songs in the playlist.  Tap GENRES to add some.</div>`;
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + trackRows;
          musicBody.querySelectorAll('.song').forEach(row => {
            const url = row.dataset.url;
            // Tap the name area → play this track.
            const nameEl = row.querySelector('.name');
            if (nameEl) addTap(nameEl, () => {
              window.__music?.playTrack?.(url);
              renderMusic();
            });
            // Up / down arrows reorder within the playlist.
            const up   = row.querySelector('.reorder-btn.up');
            const down = row.querySelector('.reorder-btn.down');
            if (up   && !up.disabled)   addTap(up,   () => { playlistMove(url, -1); renderMusic(); });
            if (down && !down.disabled) addTap(down, () => { playlistMove(url, +1); renderMusic(); });
            // Checkbox in selected view = "remove from playlist".
            const cb = row.querySelector('.song-check');
            if (cb) addTap(cb, () => { playlistRemove(url); renderMusic(); });

            // Long-press drag-to-reorder.  500ms hold without moving
            // > 8 px arms drag mode; while dragging the row follows
            // the finger Y, swapping with whichever sibling it
            // overlaps.  Pointerup commits + re-renders.
            let holdTimer = null;
            let dragging  = false;
            let startY    = 0;
            let baselineY = 0;
            let lastDragEnd = 0;
            const cancelHold = () => {
              if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
            };
            // Eat the click that iOS fires AFTER pointerup whenever
            // a drag just finished, so the song-name's addTap doesn't
            // play the (now-relocated) song.
            row.addEventListener('click', (e) => {
              if (Date.now() - lastDragEnd < 350) {
                e.stopPropagation();
                e.preventDefault();
              }
            }, { capture: true });
            row.addEventListener('pointerdown', (e) => {
              // Skip ONLY the buttons that need their own short-tap
              // handlers (up/down arrows + checkbox).  The song name
              // is the main grab-handle for the long-press drag, so
              // it's included here.  If the user releases under 500
              // ms, no drag starts and the name's addTap can still
              // fire to play the track.
              if (e.target.closest('.reorder-btn') || e.target.closest('.song-check')) return;
              startY    = e.clientY;
              baselineY = e.clientY;
              holdTimer = setTimeout(() => {
                dragging = true;
                row.classList.add('dragging');
                // Once drag is active, take the gesture away from
                // iOS native pan-y scroll so pointermove fires into
                // our handler instead of becoming list scroll.
                row.style.touchAction = 'none';
                try { row.setPointerCapture?.(e.pointerId); } catch (_) {}
              }, 500);
            }, { passive: false });
            row.addEventListener('pointermove', (e) => {
              // Cancel pending long-press if the user starts moving
              // before the 500ms tick.
              if (!dragging) {
                if (Math.abs(e.clientY - startY) > 8) cancelHold();
                return;
              }
              e.preventDefault();
              const delta = e.clientY - baselineY;
              row.style.transform = `translateY(${delta}px)`;
              // Find any sibling whose vertical centre is now under
              // the dragged row's centre — swap them in playlist + DOM.
              const myRect = row.getBoundingClientRect();
              const myMid  = myRect.top + myRect.height / 2;
              const siblings = [...row.parentElement.querySelectorAll('.song:not(.dragging)')];
              for (const sib of siblings) {
                const sRect = sib.getBoundingClientRect();
                if (myMid > sRect.top && myMid < sRect.bottom) {
                  const myIdx  = playlist.indexOf(url);
                  const sibUrl = sib.dataset.url;
                  const sibIdx = playlist.indexOf(sibUrl);
                  if (myIdx === -1 || sibIdx === -1) break;
                  // Swap in the playlist array.
                  [playlist[myIdx], playlist[sibIdx]] = [playlist[sibIdx], playlist[myIdx]];
                  // Move in DOM so visual order matches; reset
                  // baseline so transform stays anchored to the new
                  // resting position.
                  if (sibIdx > myIdx) sib.after(row);
                  else                sib.before(row);
                  const newRect = row.getBoundingClientRect();
                  baselineY = e.clientY - (newRect.top - sRect.top);
                  row.style.transform = `translateY(${e.clientY - baselineY}px)`;
                  break;
                }
              }
            }, { passive: false });
            const finishDrag = (e) => {
              cancelHold();
              if (!dragging) return;
              // Eat the pointerup so the song-name's addTap doesn't
              // also fire (which would play the track AND re-render,
              // wiping the dragged row mid-finish).
              if (e) {
                try { e.stopPropagation(); } catch (_) {}
                try { e.preventDefault();  } catch (_) {}
              }
              dragging = false;
              row.classList.remove('dragging');
              row.style.transform = '';
              // Restore native list scrolling on this row.
              row.style.touchAction = '';
              lastDragEnd = Date.now();
              renderMusic();
            };
            // Capture-phase so the row's pointerup runs BEFORE the
            // name's bubble-phase addTap and can stopPropagation when
            // a drag is finishing.
            row.addEventListener('pointerup',     finishDrag, { capture: true, passive: false });
            row.addEventListener('pointercancel', finishDrag, { capture: true });
          });
        } else if (musicGenreIdx == null) {
          // Genre grid view
          musicTitle.textContent = 'MUSIC';
          musicShuffle.style.display = '';
          musicShuffleG.style.display = 'none';
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + `<div class="genre-grid">` + stations.map((s) => {
            const tracks      = s.tracks ?? [];
            const tracksCount = tracks.length;
            const playing     = cur && cur.index === s.index;
            const checkedCnt  = tracks.reduce((n, t) => n + (playlistHas(t) ? 1 : 0), 0);
            const allChecked  = tracksCount > 0 && checkedCnt === tracksCount;
            const someChecked = checkedCnt > 0 && !allChecked;
            const checkGlyph  = allChecked ? '✓' : (someChecked ? '–' : '');
            const checkClass  = allChecked ? 'checked' : (someChecked ? 'partial' : '');
            const isDefault   = (window.__music?.getDefaultStation?.() ?? 0) === s.index;
            const culture = s.culture ?? '';
            const cultureArt = culture ? `<div class="genre-art" aria-hidden="true">
              <img src="assets/ui/music_genres/${culture}.png?v=vehicle-scenes-1" alt="" />
            </div>` : '';
            return `<div class="genre ${playing ? 'playing' : ''}" data-idx="${s.index}" style="border-color:${s.color}; box-shadow:inset 0 0 3.5vmin ${s.color}30, 0 0 8px rgba(0,0,0,0.5);">
              ${cultureArt}
              <button class="genre-check ${checkClass}" data-idx="${s.index}" aria-label="Toggle ${s.name} songs">${checkGlyph}</button>
              <button class="genre-default ${isDefault ? 'on' : ''}" data-idx="${s.index}" aria-label="Set ${s.name} as default station">${isDefault ? '★' : '☆'}</button>
              ${isDefault ? '<span class="genre-default-lbl">DEFAULT</span>' : ''}
              <span class="genre-name ${s.name.length > 11 ? 'long' : ''}" style="color:${s.color};">${s.name}</span><br/><span class="genre-count">${tracksCount} song${tracksCount === 1 ? '' : 's'}</span>
            </div>`;
          }).join('') + `</div>`;
          musicBody.querySelectorAll('.genre').forEach(el => {
            addTap(el, () => {
              musicGenreIdx = parseInt(el.dataset.idx, 10);
              renderMusic();
            });
            const cb = el.querySelector('.genre-check');
            if (cb) addTap(cb, () => {
              const idx = parseInt(cb.dataset.idx, 10);
              const st  = stations[idx];
              const ts  = st?.tracks ?? [];
              if (!ts.length) return;
              const allIn = ts.every(t => playlistHas(t));
              if (allIn) ts.forEach(t => playlistRemove(t));
              else       ts.forEach(t => playlistAdd(t));
              renderMusic();
            });
            // Default-station star — persists settings.radio (boot default).
            const def = el.querySelector('.genre-default');
            if (def) addTap(def, () => {
              const idx = parseInt(def.dataset.idx, 10);
              window.__music?.setDefaultStation?.(idx);
              // Your default station IS your genre — swap the culture art to match.
              const st = (window.__music?.list?.() ?? [])[idx];
              if (st && st.culture) window.__genre?.set?.(st.culture);
              renderMusic();
              // If the tutorial is waiting on a genre pick, this completes it.
              try { window.__tut?.genrePicked?.(); } catch (_) {}
            });
          });
        } else {
          // Song list view for selected genre
          const st = stations[musicGenreIdx];
          musicTitle.textContent = st?.name ?? 'MUSIC';
          musicShuffle.style.display = 'none';
          musicShuffleG.style.display = (st?.tracks?.length ?? 0) > 1 ? '' : 'none';
          const tracks = st?.tracks ?? [];
          const backRow = `<button class="back-btn" id="phone-music-back">← GENRES</button>`;
          const playingUrl = window.__music?.nowPlayingUrl?.() ?? '';
          const trackRows = tracks.length
            ? `<div class="song-list">` + tracks.map((url, i) => {
                const checked = playlistHas(url);
                const isPlaying = playingUrl && playingUrl.endsWith(url);
                return `<div class="song${isPlaying ? ' playing' : ''}" data-url="${url}">
                  <button class="song-check ${checked ? 'checked' : ''}" data-url="${url}" aria-label="Add to playlist">${checked ? '✓' : ''}</button>
                  <span class="num">${i + 1}</span>
                  <span class="name">${prettyTrack(url)}</span>
                </div>`;
              }).join('') + `</div>`
            : `<div style="color:#88A; text-align:center; padding:6vmin;">This station is procedural — no individual tracks.</div>`;
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + backRow + trackRows;
          addTap(musicBody.querySelector('#phone-music-back'), () => {
            musicGenreIdx = null;
            renderMusic();
          });
          musicBody.querySelectorAll('.song').forEach(row => {
            addTap(row, () => {
              window.__music?.playTrack?.(row.dataset.url);
              renderMusic();
            });
            const cb = row.querySelector('.song-check');
            if (cb) addTap(cb, () => {
              const url = cb.dataset.url;
              if (playlistHas(url)) playlistRemove(url);
              else                  playlistAdd(url);
              renderMusic();
            });
          });
        }
        // Playlist-bar buttons — wired after every render since the
        // HTML is rebuilt.  Both Play / Clear operate on visible
        // scope; View flips between main + selected modes.
        const plView  = musicBody.querySelector('#phone-music-pl-view');
