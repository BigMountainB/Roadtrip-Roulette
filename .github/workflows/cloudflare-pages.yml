name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # lets you re-run manually after adding the secrets

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      # First run creates the Pages project; `|| true` makes it a no-op on
      # every run after that (project already exists).
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages project create roadtrip-roulette --production-branch=main || true
      # Plain wrangler invocation — the EXACT command that deploys from the
      # terminal. The cloudflare/pages-action@v1 and cloudflare/wrangler-action@v3
      # both failed to forward CLOUDFLARE_API_TOKEN; a `run:` step with env: is
      # reliable. (Proven on the DUI project's deploy.)
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages deploy dist --project-name=roadtrip-roulette --branch=main
